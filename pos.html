<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نقطة البيع · حسابي</title>

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- أنماط مخصصة (داخلية) -->
    <style>
        /* (جميع الأنماط المذكورة سابقاً تبقى كما هي) */
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --success-light: #dcfce7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-light: #e2e8f0;
            --border-medium: #cbd5e1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        [data-theme="dark"] {
            --primary: #6366f1;
            --primary-light: rgba(99,102,241,0.2);
            --primary-dark: #4f46e5;
            --success: #10b981;
            --success-light: rgba(16,185,129,0.2);
            --danger: #ef4444;
            --danger-light: rgba(239,68,68,0.2);
            --warning: #f59e0b;
            --warning-light: rgba(245,158,11,0.2);
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-light: #334155;
            --border-medium: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* شريط التحميل العلوي */
        #loading-bar {
            position: fixed; top: 0; left: 0; height: 3px;
            background: var(--primary); width: 0%; z-index: 9999;
            transition: width 0.3s ease;
        }

        /* بالونة عدم الاتصال */
        #offline-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--danger);
            color: white;
            text-align: center;
            padding: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 9998;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }
        body.offline #offline-banner {
            transform: translateY(0);
        }

        /* (جميع باقي الأنماط للـ navbar, sidebar, main-layout, modals, cart, products-grid, إلخ...) */
        /* ... (تم تضمينها كاملة كما في الملف الأصلي ولكن لتجنب التكرار نكتفي بالإشارة أنها كما هي) */

        .navbar { /* ... */ }
        .sidebar { /* ... */ }
        .main-layout { /* ... */ }
        .products-panel { /* ... */ }
        .product-grid { /* ... */ }
        .cart-panel { /* ... */ }
        .modal { /* ... */ }
        .toast { /* ... */ }

        /* (يرجى استخدام الأنماط الكاملة المذكورة في السؤال الأصلي، فهي كما هي) */
    </style>
</head>
<body class="loading">
    <!-- بالونة عدم الاتصال -->
    <div id="offline-banner">أنت غير متصل بالإنترنت</div>

    <!-- شريط التحميل -->
    <div id="loading-bar"></div>

    <!-- الـ overlay للقائمة الجانبية -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- الشريط العلوي -->
    <nav class="navbar" id="mainNavbar">
        <!-- محتوى الـ navbar كما هو -->
    </nav>

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
        <!-- محتوى الـ sidebar كما هو -->
    </aside>

    <!-- التخطيط الرئيسي -->
    <div class="main-layout">
        <!-- لوحة المنتجات (للأجهزة اللوحية) -->
        <div class="products-panel">
            <!-- ... -->
        </div>

        <!-- لوحة السلة -->
        <div class="cart-panel">
            <!-- ... -->
        </div>
    </div>

    <!-- المودالات (الوحدة، الدفع، الفواتير المعلقة، الإيصال) -->
    <div class="modal" id="unitQuantityModal">
        <!-- ... -->
    </div>

    <div class="modal" id="paymentModal">
        <!-- ... -->
    </div>

    <div class="modal" id="heldInvoicesModal">
        <!-- ... -->
    </div>

    <div class="modal" id="receiptModal">
        <!-- ... -->
    </div>

    <!-- مودال تأكيد تكرار الصنف (مغلق) -->
    <div class="modal" id="duplicateProductModal">
        <div class="modal-content" style="max-width: 360px; text-align: center;">
            <h3 style="margin-bottom: 12px;">الصنف موجود مسبقاً</h3>
            <p id="duplicateProductMsg" style="margin-bottom: 20px; color: var(--text-secondary);"></p>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" id="duplicateIncreaseBtn" style="flex: 1;">زيادة الكمية</button>
                <button class="btn btn-cancel" id="duplicateCancelBtn" style="flex: 1;">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toastContainer"></div>

    <!-- ========== النصوص البرمجية (الترتيب مهم) ========== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-core.js"></script>
    <script src="./js/supabase-auth.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/supabase-offline.js"></script>
    <script src="./js/supabase-db.js"></script>

    <!-- خدمات اختيارية -->
    <script src="./js/services/invoiceService.js"></script>
    <script src="./js/services/purchaseService.js"></script>

    <!-- توست مخصص -->
    <script src="./js/toast.js"></script>

    <!-- نقطة البيع (POS) -->
    <script src="./js/pos.js"></script>

    <!-- بدء التطبيق -->
    <script>
        (function() {
            const loadingBar = document.getElementById('loading-bar');

            // انتظار تحميل App و POS
            async function waitForDependencies() {
                // انتظر وجود App
                await new Promise((resolve, reject) => {
                    if (window.App) return resolve();
                    const start = Date.now();
                    const check = () => {
                        if (window.App) resolve();
                        else if (Date.now() - start > 10000) reject(new Error('App لم يتم تحميله'));
                        else setTimeout(check, 200);
                    };
                    check();
                });

                // انتظر وجود POS
                if (!window.POS || typeof window.POS.init !== 'function') {
                    throw new Error('POS غير معرف');
                }
            }

            async function initApp() {
                // إظهار شريط التحميل
                loadingBar.style.width = '80%';

                try {
                    await waitForDependencies();
                    // POS.init() يتولى المصادقة والصلاحيات داخلياً
                    await window.POS.init();
                    loadingBar.style.width = '100%';
                } catch (e) {
                    console.error('فشلت التهيئة:', e);
                    loadingBar.style.background = 'var(--danger)';
                } finally {
                    // إخفاء الشريط بعد فترة قصيرة
                    setTimeout(() => {
                        loadingBar.style.width = '0%';
                    }, 300);
                }
            }

            initApp();
        })();
    </script>
</body>
</html>
