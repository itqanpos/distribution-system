<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نقطة البيع - نظام التوزيع الغذائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #1abc9c;
            --light: #ecf0f1;
            --dark: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f5f6fa;
            color: #333;
            overflow-x: hidden;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 0 15px;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), var(--info));
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text h2 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 2px;
        }

        .logo-text p {
            color: var(--secondary);
            font-size: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--success), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pos-container {
            margin-top: 60px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 15px;
            min-height: calc(100vh - 60px);
        }

        .products-section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .search-bar input:focus {
            border-color: var(--secondary);
            outline: none;
        }

        .filter-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-tab.active {
            background: var(--secondary);
            color: white;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 250px);
            padding: 5px;
        }

        .product-card {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .product-card:hover {
            background: var(--light);
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .product-card h4 {
            font-size: 15px;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .product-card .unit {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .product-card .price {
            font-weight: bold;
            color: var(--secondary);
            font-size: 16px;
            margin-bottom: 3px;
        }

        .product-card .limits {
            font-size: 10px;
            color: #95a5a6;
        }

        .cart-section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .customer-selector {
            margin-bottom: 15px;
        }

        .customer-selector input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            max-height: 350px;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 2;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item-unit {
            font-size: 11px;
            color: #7f8c8d;
        }

        .cart-item-price {
            font-size: 13px;
            color: var(--secondary);
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-item-controls input {
            width: 60px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }

        .cart-item-total {
            font-weight: bold;
            min-width: 70px;
            text-align: left;
        }

        .cart-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--danger);
            font-size: 14px;
        }

        .cart-summary {
            border-top: 2px solid #eee;
            padding-top: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-row.total {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }

        .payment-methods {
            margin: 15px 0;
        }

        .payment-methods select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .mixed-payment {
            display: none;
            margin-top: 10px;
        }

        .mixed-payment input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-primary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--secondary); color: var(--secondary); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .unit-option {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .unit-option.selected {
            background: rgba(52,152,219,0.1);
            border-color: var(--secondary);
        }

        @media (max-width: 992px) {
            .pos-container { grid-template-columns: 1fr; }
            .product-grid { max-height: 300px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-truck"></i></div>
            <div class="logo-text">
                <h2>نظام التوزيع الغذائي</h2>
                <p>نقطة البيع</p>
            </div>
        </div>
        <div class="user-info">
            <div class="user-details" style="display:none;"><h4 id="userName">مدير النظام</h4></div>
            <div class="user-avatar" id="userAvatar">م</div>
            <button class="logout-btn" onclick="UI.logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </nav>

    <div class="pos-container">
        <div class="products-section">
            <div class="search-bar">
                <input type="text" id="productSearch" placeholder="بحث سريع عن المنتج..." list="productSuggestions" autocomplete="off">
                <datalist id="productSuggestions"></datalist>
                <button class="btn btn-primary" style="padding:12px;" onclick="scanBarcode()"><i class="fas fa-barcode"></i></button>
            </div>
            <div class="filter-tabs" id="categoryFilters"></div>
            <div class="product-grid" id="productGrid"></div>
        </div>

        <div class="cart-section">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> الفاتورة</h3>
                <button class="btn btn-outline" style="padding:5px 10px;" onclick="clearCart()"><i class="fas fa-trash"></i> جديد</button>
            </div>

            <div class="customer-selector">
                <input type="text" id="customerSearch" placeholder="بحث عن عميل..." list="customerSuggestions" autocomplete="off">
                <datalist id="customerSuggestions"></datalist>
                <div style="margin-top:5px; font-size:12px; color:#7f8c8d;" id="customerBalanceDisplay"></div>
            </div>

            <div class="cart-items" id="cartItemsContainer"></div>

            <div class="cart-summary">
                <div class="summary-row"><span>عدد الأصناف:</span><span id="itemTypesCount">0</span></div>
                <div class="summary-row"><span>إجمالي القطع:</span><span id="totalPieces">0</span></div>
                <div class="summary-row"><span>الإجمالي:</span><span id="subtotal">0.00 ج</span></div>
                <div class="summary-row"><span>الخصم:</span><input type="number" id="discount" min="0" step="0.01" value="0" style="width:80px; text-align:left;" oninput="calculateTotals()"> ج</div>
                <div class="summary-row"><span>الضريبة (14%):</span><span id="taxAmount">0.00 ج</span></div>
                <div class="summary-row total"><span>الصافي:</span><span id="netTotal">0.00 ج</span></div>
            </div>

            <div class="payment-methods">
                <select id="paymentMethod" onchange="toggleMixedPayment()">
                    <option value="cash">نقدي</option>
                    <option value="credit">آجل</option>
                    <option value="mixed">مختلط (نقدي + آجل)</option>
                    <option value="bank">تحويل بنكي</option>
                </select>
                <div class="mixed-payment" id="mixedPaymentDiv">
                    <label>المبلغ المدفوع</label>
                    <input type="number" id="paidAmount" min="0" step="0.01" oninput="calculateRemainingAndExcess()">
                    <label>المبلغ الآجل</label>
                    <input type="number" id="creditAmount" readonly>
                    <label>الفائض</label>
                    <input type="number" id="excessAmount" readonly>
                    <small id="excessNote"></small>
                </div>
                <div id="bankDetails" style="display:none; margin-top:10px;">
                    <label>رقم الحساب / المرجع</label>
                    <input type="text" id="bankReference" placeholder="رقم التحويل" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-success" onclick="completeSale()"><i class="fas fa-check"></i> إتمام البيع</button>
                <button class="btn btn-warning" onclick="printReceipt()"><i class="fas fa-print"></i> طباعة</button>
            </div>
        </div>
    </div>

    <!-- مودال اختيار الوحدة -->
    <div class="modal" id="unitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalProductName">اختر الوحدة</h3>
                <button class="close-btn" onclick="closeUnitModal()">&times;</button>
            </div>
            <div id="unitOptions"></div>
            <div style="margin-top:15px;">
                <label>الكمية</label>
                <input type="number" id="selectedQuantity" min="0.001" step="0.001" value="1" style="width:100%; padding:10px;">
            </div>
            <div style="margin-top:15px;">
                <label>السعر (ضمن الحدود)</label>
                <input type="number" id="selectedPrice" min="0" step="0.01" style="width:100%; padding:10px;">
                <small id="priceLimits"></small>
            </div>
            <button class="btn btn-primary" style="margin-top:20px; width:100%;" onclick="addToCartWithOptions()">إضافة إلى الفاتورة</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/print.js"></script>
    <script>
        let products = [];
        let customers = [];
        let cart = [];
        let selectedProduct = null;
        let selectedUnitIndex = 0;
        let currentCategory = 'الكل';
        let selectedCustomerId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.requireAuth()) return;
            if (!Auth.requireRole(['admin'])) return;
            await UI.initPage('نقطة البيع');

            products = await Storage.getProducts();
            customers = await Storage.getCustomers();

            populateDatalists();
            
            const categories = ['الكل', ...new Set(products.map(p => p.category))];
            const filterDiv = document.getElementById('categoryFilters');
            filterDiv.innerHTML = categories.map(cat => 
                `<button class="filter-tab ${cat === 'الكل' ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`
            ).join('');
            
            renderProducts();
            document.getElementById('productSearch').addEventListener('input', renderProducts);
        });

        function populateDatalists() {
            const productList = document.getElementById('productSuggestions');
            productList.innerHTML = products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            
            const customerList = document.getElementById('customerSuggestions');
            customerList.innerHTML = customers.map(c => `<option value="${c.name}" data-id="${c.id}">${c.name}</option>`).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const term = document.getElementById('productSearch').value.toLowerCase();
            let filtered = products;
            if (currentCategory !== 'الكل') filtered = filtered.filter(p => p.category === currentCategory);
            if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term) || p.units.some(u => u.barcode?.includes(term)));
            
            const grid = document.getElementById('productGrid');
            grid.innerHTML = filtered.map(p => {
                const u = p.units[0];
                return `<div class="product-card" onclick="openUnitModal(${p.id})"><h4>${p.name}</h4><div class="unit">${u.unit}</div><div class="price">${u.price} ج</div><div class="limits">${u.min}-${u.max} ج</div></div>`;
            }).join('');
        }

        function openUnitModal(productId) {
            selectedProduct = products.find(p => p.id === productId);
            document.getElementById('modalProductName').textContent = selectedProduct.name;
            
            const optionsDiv = document.getElementById('unitOptions');
            optionsDiv.innerHTML = selectedProduct.units.map((u, i) => `
                <div class="unit-option ${i===0?'selected':''}" onclick="selectUnit(${i})">
                    <strong>${u.unit}</strong><br>السعر: ${u.price} ج (${u.min}-${u.max})<br>المخزون: ${u.stock}
                </div>
            `).join('');
            
            selectedUnitIndex = 0;
            updatePriceLimits();
            document.getElementById('unitModal').style.display = 'flex';
            document.getElementById('selectedQuantity').focus();
        }

        function selectUnit(index) {
            selectedUnitIndex = index;
            document.querySelectorAll('.unit-option').forEach((o,i) => o.classList.toggle('selected', i===index));
            updatePriceLimits();
        }

        function updatePriceLimits() {
            const u = selectedProduct.units[selectedUnitIndex];
            document.getElementById('selectedPrice').value = u.price;
            document.getElementById('selectedPrice').min = u.min;
            document.getElementById('selectedPrice').max = u.max;
            document.getElementById('priceLimits').textContent = `الحدود: ${u.min} - ${u.max} ج`;
        }

        function closeUnitModal() { document.getElementById('unitModal').style.display = 'none'; }

        function addToCartWithOptions() {
            const u = selectedProduct.units[selectedUnitIndex];
            const qty = parseFloat(document.getElementById('selectedQuantity').value);
            let price = parseFloat(document.getElementById('selectedPrice').value);
            if (price < u.min || price > u.max) { alert(`السعر بين ${u.min} و ${u.max}`); return; }
            if (qty <= 0) { alert('كمية غير صالحة'); return; }
            if (qty > u.stock) { alert('المخزون غير كاف'); return; }

            const existing = cart.find(i => i.productId === selectedProduct.id && i.unitIndex === selectedUnitIndex);
            if (existing) {
                if (existing.quantity + qty > u.stock) { alert('المخزون غير كاف'); return; }
                existing.quantity += qty;
            } else {
                cart.push({
                    productId: selectedProduct.id, productName: selectedProduct.name,
                    unitIndex: selectedUnitIndex, unitName: u.unit, quantity: qty, price: price
                });
            }
            renderCart();
            closeUnitModal();
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#7f8c8d;">السلة فارغة</p>';
                updateStats();
                return;
            }
            container.innerHTML = cart.map((item, idx) => {
                const total = item.price * item.quantity;
                return `<div class="cart-item">
                    <div class="cart-item-info"><div class="cart-item-name">${item.productName}</div><div class="cart-item-unit">${item.unitName}</div></div>
                    <div class="cart-item-controls"><input type="number" value="${item.quantity}" onchange="updateQuantity(${idx}, this.value)"><span class="cart-item-total">${total.toFixed(2)} ج</span></div>
                    <div class="cart-item-actions"><button onclick="removeItem(${idx})"><i class="fas fa-trash"></i></button></div>
                </div>`;
            }).join('');
            updateStats();
        }

        function updateQuantity(idx, val) {
            const qty = parseFloat(val);
            const item = cart[idx];
            const product = products.find(p => p.id === item.productId);
            const unit = product.units[item.unitIndex];
            if (qty <= 0) cart.splice(idx, 1);
            else if (qty > unit.stock) { alert('المخزون غير كاف'); renderCart(); return; }
            else item.quantity = qty;
            renderCart();
        }

        function removeItem(idx) { cart.splice(idx, 1); renderCart(); }

        function updateStats() {
            const itemTypes = cart.length;
            const totalPieces = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('itemTypesCount').textContent = itemTypes;
            document.getElementById('totalPieces').textContent = totalPieces;
            calculateTotals();
        }

        function calculateTotals() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const after = subtotal - discount;
            const tax = after * 0.14;
            const net = after + tax;
            document.getElementById('subtotal').textContent = subtotal.toFixed(2) + ' ج';
            document.getElementById('taxAmount').textContent = tax.toFixed(2) + ' ج';
            document.getElementById('netTotal').textContent = net.toFixed(2) + ' ج';
            if (document.getElementById('paymentMethod').value === 'mixed') calculateRemainingAndExcess();
        }

        function toggleMixedPayment() {
            const method = document.getElementById('paymentMethod').value;
            document.getElementById('mixedPaymentDiv').style.display = method === 'mixed' ? 'block' : 'none';
            document.getElementById('bankDetails').style.display = method === 'bank' ? 'block' : 'none';
            if (method === 'mixed') calculateRemainingAndExcess();
        }

        function calculateRemainingAndExcess() {
            const net = parseFloat(document.getElementById('netTotal').textContent) || 0;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const credit = Math.max(0, net - paid);
            const excess = Math.max(0, paid - net);
            document.getElementById('creditAmount').value = credit.toFixed(2);
            document.getElementById('excessAmount').value = excess.toFixed(2);

            if (excess > 0 && selectedCustomerId) {
                const customer = customers.find(c => c.id === selectedCustomerId);
                if (customer) {
                    const debt = Math.abs(customer.balance || 0);
                    if (customer.balance < 0) {
                        document.getElementById('excessNote').textContent = `سيتم خصم ${Utils.formatMoney(Math.min(excess, debt))} من المديونية`;
                    } else {
                        document.getElementById('excessNote').textContent = `سيتم إضافة الفائض كرصيد للعميل`;
                    }
                }
            } else {
                document.getElementById('excessNote').textContent = '';
            }
        }

        // ربط البحث عن العميل
        document.getElementById('customerSearch').addEventListener('input', function() {
            const val = this.value;
            const option = Array.from(document.querySelectorAll('#customerSuggestions option')).find(opt => opt.value === val);
            if (option) {
                selectedCustomerId = parseInt(option.dataset.id);
                const customer = customers.find(c => c.id === selectedCustomerId);
                if (customer) {
                    const balance = customer.balance || 0;
                    document.getElementById('customerBalanceDisplay').textContent = balance >= 0 ? `رصيد له: ${Utils.formatMoney(balance)}` : `مديونية: ${Utils.formatMoney(Math.abs(balance))}`;
                }
            } else {
                selectedCustomerId = null;
                document.getElementById('customerBalanceDisplay').textContent = '';
            }
        });

        async function completeSale() {
            if (cart.length === 0) { alert('أضف منتجات'); return; }
            if (!selectedCustomerId) { alert('اختر عميلاً'); return; }

            const customer = customers.find(c => c.id === selectedCustomerId);
            const paymentMethod = document.getElementById('paymentMethod').value;
            const net = parseFloat(document.getElementById('netTotal').textContent);
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            
            let paid = 0, remaining = net, excess = 0;
            if (paymentMethod === 'cash') { paid = net; remaining = 0; }
            else if (paymentMethod === 'credit') { paid = 0; remaining = net; }
            else if (paymentMethod === 'mixed') {
                paid = parseFloat(document.getElementById('paidAmount').value) || 0;
                remaining = parseFloat(document.getElementById('creditAmount').value) || 0;
                excess = parseFloat(document.getElementById('excessAmount').value) || 0;
            }

            if (excess > 0) {
                if (customer.balance < 0) {
                    const debtReduction = Math.min(excess, Math.abs(customer.balance));
                    customer.balance += debtReduction;
                    excess -= debtReduction;
                }
                if (excess > 0) customer.balance += excess;
                await Storage.saveCustomer(customer);
            }

            if (remaining > 0) {
                customer.balance -= remaining;
                await Storage.saveCustomer(customer);
            }

            const invoice = {
                id: 'INV-' + Date.now(), type: 'sale', customer: customer.name, customerId: customer.id,
                repId: Auth.getRepId(), date: Utils.getToday(), total: net, paid: paid + (excess > 0 ? Math.min(excess, Math.abs(customer.balance)) : 0),
                remaining, discount, status: remaining === 0 ? 'paid' : 'partial', paymentMethod, items: cart
            };
            await Storage.saveInvoice(invoice);

            cart.forEach(i => {
                const p = products.find(pr => pr.id === i.productId);
                p.units[i.unitIndex].stock -= i.quantity;
            });
            await Storage.saveProducts(products);

            if (paid > 0) {
                await Storage.saveTransaction({
                    id: Date.now(), date: Utils.getToday(), type: 'income', amount: paid,
                    description: `بيع - ${invoice.id}`, paymentMethod, reference: invoice.id
                });
            }

            alert(`تم البيع. الفاتورة ${invoice.id}`);
            if (confirm('طباعة الإيصال؟')) printReceipt();
            
            cart = []; renderCart();
            document.getElementById('discount').value = 0;
            document.getElementById('customerSearch').value = '';
            selectedCustomerId = null;
            renderProducts();
        }

        function printReceipt() {
            if (cart.length === 0) { alert('لا عناصر'); return; }
            const totals = {
                subtotal: cart.reduce((s, i) => s + i.price * i.quantity, 0),
                discount: parseFloat(document.getElementById('discount').value) || 0,
                net: parseFloat(document.getElementById('netTotal').textContent)
            };
            const customer = customers.find(c => c.id === selectedCustomerId);
            PrintSystem.printThermalReceipt(cart, totals, customer, document.getElementById('paymentMethod').value);
        }

        function clearCart() { if (confirm('مسح الفاتورة؟')) { cart = []; renderCart(); } }
        function scanBarcode() {
            const code = prompt('باركود:');
            if (!code) return;
            for (let p of products) {
                const idx = p.units.findIndex(u => u.barcode === code);
                if (idx >= 0) { selectedProduct = p; selectedUnitIndex = idx; openUnitModal(p.id); return; }
            }
            alert('لم يتم العثور');
        }
    </script>
