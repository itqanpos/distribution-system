<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نقطة البيع - مندوب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #1abc9c;
            --light: #ecf0f1;
            --dark: #34495e;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #333;
            overflow-x: hidden;
        }

        /* شريط علوي */
        .navbar {
            background: white;
            box-shadow: var(--shadow);
            padding: 0 16px;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), var(--info));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .logo-text h2 {
            color: var(--primary);
            font-size: 20px;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--success), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        /* الحاوية الرئيسية */
        .pos-container {
            margin-top: 64px;
            padding: 20px 20px 90px;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 20px;
            min-height: calc(100vh - 64px);
        }

        /* قسم المنتجات */
        .products-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            font-size: 16px;
            transition: all 0.3s;
            background: #fafafa;
        }

        .search-bar input:focus {
            border-color: var(--secondary);
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        .btn-icon {
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            overflow-y: auto;
            max-height: calc(100vh - 280px);
            padding: 4px;
        }

        .product-card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            padding: 16px 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .product-card:hover {
            border-color: var(--secondary);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.15);
        }

        .product-card h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .product-card .price {
            font-weight: bold;
            color: var(--secondary);
            font-size: 18px;
            margin-bottom: 4px;
        }

        .product-card .unit {
            font-size: 13px;
            color: #7f8c8d;
        }

        /* قسم السلة */
        .cart-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .cart-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .customer-selector {
            margin-bottom: 20px;
        }

        .customer-selector input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            font-size: 16px;
            background: #fafafa;
            transition: all 0.3s;
        }

        .customer-selector input:focus {
            border-color: var(--secondary);
            background: white;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        .balance-info {
            margin-top: 8px;
            font-size: 14px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 30px;
            display: inline-block;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            max-height: 280px;
            margin-bottom: 20px;
            padding-right: 4px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-info {
            flex: 2;
        }

        .cart-item-name {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cart-item-details {
            font-size: 13px;
            color: #7f8c8d;
        }

        .cart-item-total {
            font-weight: 700;
            color: var(--primary);
            margin: 0 12px;
        }

        .delete-item {
            color: var(--danger);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .delete-item:hover {
            background: rgba(231, 76, 60, 0.1);
        }

        .cart-summary {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .summary-row.total {
            font-size: 20px;
            font-weight: 700;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px dashed #ccc;
        }

        .discount-input {
            width: 80px;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            text-align: left;
        }

        .payment-methods select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            font-size: 16px;
            background: white;
            margin-bottom: 12px;
        }

        .mixed-payment {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: none;
        }

        .mixed-payment input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 30px;
            margin-bottom: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            padding: 16px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        /* مودال احترافي */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #95a5a6;
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: #f0f0f0;
            color: var(--danger);
        }

        .unit-option {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .unit-option.selected {
            background: rgba(52, 152, 219, 0.08);
            border-color: var(--secondary);
        }

        .unit-option strong {
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: var(--primary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(52,152,219,0.1);
        }

        .price-limits {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 6px;
        }

        .modal .btn {
            padding: 14px;
            width: 100%;
            margin-top: 8px;
        }

        /* شريط سفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 999;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .nav-item {
            text-align: center;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--secondary);
        }

        @media (max-width: 992px) {
            .pos-container {
                grid-template-columns: 1fr;
            }
            .product-grid {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-truck"></i></div>
            <div class="logo-text"><h2>نقطة البيع</h2></div>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">م</div>
            <button class="logout-btn" onclick="UI.logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </nav>

    <div class="pos-container">
        <div class="products-section">
            <div class="search-bar">
                <input type="text" id="productSearch" placeholder="ابحث عن منتج..." list="productSuggestions" autocomplete="off">
                <datalist id="productSuggestions"></datalist>
                <button class="btn-icon" onclick="scanBarcode()"><i class="fas fa-barcode"></i></button>
            </div>
            <div class="product-grid" id="productGrid"></div>
        </div>

        <div class="cart-section">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> الفاتورة</h3>
                <button class="btn-outline" onclick="clearCart()"><i class="fas fa-trash-alt"></i> جديد</button>
            </div>

            <div class="customer-selector">
                <input type="text" id="customerSearch" placeholder="ابحث عن عميل..." list="customerSuggestions" autocomplete="off">
                <datalist id="customerSuggestions"></datalist>
                <div id="customerBalanceDisplay" class="balance-info"></div>
            </div>

            <div class="cart-items" id="cartItems"></div>

            <div class="cart-summary">
                <div class="summary-row"><span>عدد الأصناف:</span><span id="itemTypesCount">0</span></div>
                <div class="summary-row"><span>إجمالي القطع:</span><span id="totalPieces">0</span></div>
                <div class="summary-row"><span>الإجمالي:</span><span id="subtotal">0.00 ج</span></div>
                <div class="summary-row">
                    <span>الخصم:</span>
                    <input type="number" id="discount" value="0" class="discount-input" oninput="calculateTotals()"> ج
                </div>
                <div class="summary-row"><span>الضريبة (14%):</span><span id="taxAmount">0.00 ج</span></div>
                <div class="summary-row total"><span>الصافي:</span><span id="netTotal">0.00 ج</span></div>
            </div>

            <div class="payment-methods">
                <select id="paymentMethod" onchange="toggleMixedPayment()">
                    <option value="cash">💵 نقدي</option>
                    <option value="credit">📋 آجل</option>
                    <option value="mixed">🔄 مختلط</option>
                    <option value="bank">🏦 تحويل بنكي</option>
                </select>
                <div class="mixed-payment" id="mixedPaymentDiv">
                    <label>المبلغ المدفوع</label>
                    <input type="number" id="paidAmount" min="0" step="0.01" placeholder="0.00" oninput="calculateRemainingAndExcess()">
                    <label>المبلغ الآجل</label>
                    <input type="number" id="creditAmount" readonly>
                    <label>الفائض</label>
                    <input type="number" id="excessAmount" readonly>
                    <small id="excessNote" style="display:block; margin-top:8px;"></small>
                </div>
                <div id="bankDetails" style="display:none;">
                    <label>رقم التحويل</label>
                    <input type="text" id="bankReference" placeholder="أدخل رقم التحويل" style="width:100%; padding:12px; border-radius:30px; border:1px solid #ddd;">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-success" onclick="completeSale()"><i class="fas fa-check-circle"></i> إتمام البيع</button>
                <button class="btn btn-warning" onclick="printReceipt()"><i class="fas fa-print"></i> طباعة</button>
            </div>
        </div>
    </div>

    <!-- مودال اختيار الوحدة -->
    <div class="modal" id="unitModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalProductName">اختر الوحدة</h3>
                <button class="close-modal" onclick="closeUnitModal()">&times;</button>
            </div>
            <div id="unitOptions"></div>
            <div class="form-group">
                <label>الكمية</label>
                <input type="number" id="selectedQuantity" min="0.001" step="0.001" value="1">
            </div>
            <div class="form-group">
                <label>السعر</label>
                <input type="number" id="selectedPrice" min="0" step="0.01">
                <div class="price-limits" id="priceLimits"></div>
            </div>
            <button class="btn btn-primary" onclick="addToCart()">إضافة إلى السلة</button>
            <button class="btn" onclick="closeUnitModal()" style="background:#f0f0f0; color:#333; margin-top:8px;">إلغاء</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="rep-dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>الرئيسية</span></a>
        <a href="rep-pos.html" class="nav-item active"><i class="fas fa-cash-register"></i><span>بيع</span></a>
        <a href="rep-customers.html" class="nav-item"><i class="fas fa-users"></i><span>العملاء</span></a>
        <a href="rep-orders.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>الطلبات</span></a>
        <a href="rep-collections.html" class="nav-item"><i class="fas fa-money-bill"></i><span>تحصيل</span></a>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/print.js"></script>
    <script>
        let products = [];
        let customers = [];
        let cart = [];
        let selectedProduct = null;
        let selectedUnitIndex = 0;
        let selectedCustomerId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.requireAuth()) return;
            const user = Auth.getUser();
            document.getElementById('userAvatar').textContent = user.avatar;

            products = await Storage.getProducts();
            customers = await Storage.getCustomers();

            populateDatalists();
            renderProducts();
            setupSearch();
        });

        function populateDatalists() {
            document.getElementById('productSuggestions').innerHTML = products.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('customerSuggestions').innerHTML = customers.map(c => `<option value="${c.name}" data-id="${c.id}">${c.name}</option>`).join('');
        }

        function setupSearch() {
            document.getElementById('productSearch').addEventListener('input', renderProducts);
            document.getElementById('customerSearch').addEventListener('input', function() {
                const val = this.value;
                const option = Array.from(document.querySelectorAll('#customerSuggestions option')).find(opt => opt.value === val);
                if (option) {
                    selectedCustomerId = parseInt(option.dataset.id);
                    updateCustomerBalance();
                } else {
                    selectedCustomerId = null;
                    document.getElementById('customerBalanceDisplay').textContent = '';
                }
            });
        }

        function updateCustomerBalance() {
            if (!selectedCustomerId) return;
            const customer = customers.find(c => c.id === selectedCustomerId);
            if (customer) {
                const balance = customer.balance || 0;
                const text = balance >= 0 ? `💰 رصيد له: ${Utils.formatMoney(balance)}` : `⚠️ مديونية: ${Utils.formatMoney(Math.abs(balance))}`;
                document.getElementById('customerBalanceDisplay').textContent = text;
            }
        }

        function renderProducts() {
            const term = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(term));
            const grid = document.getElementById('productGrid');
            grid.innerHTML = filtered.map(p => {
                const u = p.units[0];
                return `<div class="product-card" onclick="openUnitModal(${p.id})"><h4>${p.name}</h4><div class="price">${u.price} ج</div><div class="unit">${u.unit}</div></div>`;
            }).join('');
        }

        function openUnitModal(productId) {
            selectedProduct = products.find(p => p.id === productId);
            document.getElementById('modalProductName').textContent = selectedProduct.name;
            
            document.getElementById('unitOptions').innerHTML = selectedProduct.units.map((u, i) => `
                <div class="unit-option ${i===0?'selected':''}" onclick="selectUnit(${i})">
                    <strong>${u.unit}</strong>
                    <div>السعر: ${u.price} ج (${u.min}-${u.max})</div>
                    <small>المخزون: ${u.stock}</small>
                </div>
            `).join('');
            
            selectedUnitIndex = 0;
            updatePriceLimits();
            document.getElementById('unitModal').style.display = 'flex';
            document.getElementById('selectedQuantity').focus();
        }

        function selectUnit(index) {
            selectedUnitIndex = index;
            document.querySelectorAll('.unit-option').forEach((el, i) => el.classList.toggle('selected', i === index));
            updatePriceLimits();
        }

        function updatePriceLimits() {
            const unit = selectedProduct.units[selectedUnitIndex];
            document.getElementById('selectedPrice').value = unit.price;
            document.getElementById('selectedPrice').min = unit.min;
            document.getElementById('selectedPrice').max = unit.max;
            document.getElementById('priceLimits').textContent = `الحدود المسموحة: ${unit.min} - ${unit.max} ج`;
        }

        function closeUnitModal() { document.getElementById('unitModal').style.display = 'none'; }

        function addToCart() {
            const unit = selectedProduct.units[selectedUnitIndex];
            const qty = parseFloat(document.getElementById('selectedQuantity').value);
            let price = parseFloat(document.getElementById('selectedPrice').value);
            if (price < unit.min || price > unit.max) { alert('السعر خارج الحدود المسموحة'); return; }
            if (qty <= 0) { alert('الكمية غير صالحة'); return; }
            if (qty > unit.stock) { alert('المخزون غير كافٍ'); return; }

            const existing = cart.find(i => i.productId === selectedProduct.id && i.unitIndex === selectedUnitIndex);
            if (existing) {
                if (existing.quantity + qty > unit.stock) { alert('المخزون غير كافٍ'); return; }
                existing.quantity += qty;
            } else {
                cart.push({
                    productId: selectedProduct.id,
                    productName: selectedProduct.name,
                    unitIndex: selectedUnitIndex,
                    unitName: unit.unit,
                    quantity: qty,
                    price: price
                });
            }
            renderCart();
            closeUnitModal();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">السلة فارغة</p>';
                updateStats();
                return;
            }
            container.innerHTML = cart.map((item, idx) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.productName}</div>
                        <div class="cart-item-details">${item.quantity} ${item.unitName} × ${Utils.formatMoney(item.price)}</div>
                    </div>
                    <div class="cart-item-total">${Utils.formatMoney(item.price * item.quantity)}</div>
                    <div class="delete-item" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></div>
                </div>
            `).join('');
            updateStats();
        }

        function removeFromCart(idx) { cart.splice(idx, 1); renderCart(); }

        function updateStats() {
            document.getElementById('itemTypesCount').textContent = cart.length;
            document.getElementById('totalPieces').textContent = cart.reduce((s, i) => s + i.quantity, 0).toFixed(3);
            calculateTotals();
        }

        function calculateTotals() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const after = subtotal - discount;
            const tax = after * 0.14;
            const net = after + tax;
            document.getElementById('subtotal').textContent = Utils.formatMoney(subtotal);
            document.getElementById('taxAmount').textContent = Utils.formatMoney(tax);
            document.getElementById('netTotal').textContent = Utils.formatMoney(net);
            if (document.getElementById('paymentMethod').value === 'mixed') calculateRemainingAndExcess();
        }

        function toggleMixedPayment() {
            const method = document.getElementById('paymentMethod').value;
            document.getElementById('mixedPaymentDiv').style.display = method === 'mixed' ? 'block' : 'none';
            document.getElementById('bankDetails').style.display = method === 'bank' ? 'block' : 'none';
            if (method === 'mixed') calculateRemainingAndExcess();
        }

        function calculateRemainingAndExcess() {
            const net = parseFloat(document.getElementById('netTotal').textContent.replace(/[^0-9.-]+/g, '')) || 0;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const credit = Math.max(0, net - paid);
            const excess = Math.max(0, paid - net);
            document.getElementById('creditAmount').value = credit.toFixed(2);
            document.getElementById('excessAmount').value = excess.toFixed(2);

            if (excess > 0 && selectedCustomerId) {
                const customer = customers.find(c => c.id === selectedCustomerId);
                if (customer) {
                    const debt = Math.abs(customer.balance || 0);
                    if (customer.balance < 0) {
                        document.getElementById('excessNote').textContent = `✅ سيتم خصم ${Utils.formatMoney(Math.min(excess, debt))} من المديونية`;
                    } else {
                        document.getElementById('excessNote').textContent = `✅ سيتم إضافة الفائض كرصيد للعميل`;
                    }
                }
            } else {
                document.getElementById('excessNote').textContent = '';
            }
        }

        // (باقي الدوال كما هي: completeSale, printReceipt, clearCart, scanBarcode)
        // ... (نفس الدوال السابقة مع تعديلات بسيطة في الرسائل)
        async function completeSale() {
            if (cart.length === 0) { alert('الرجاء إضافة منتجات'); return; }
            if (!selectedCustomerId) { alert('الرجاء اختيار عميل'); return; }

            const customer = customers.find(c => c.id === selectedCustomerId);
            const paymentMethod = document.getElementById('paymentMethod').value;
            const net = parseFloat(document.getElementById('netTotal').textContent.replace(/[^0-9.-]+/g, ''));
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            
            let paid = 0, remaining = net, excess = 0;
            if (paymentMethod === 'cash') { paid = net; remaining = 0; }
            else if (paymentMethod === 'credit') { paid = 0; remaining = net; }
            else if (paymentMethod === 'mixed') {
                paid = parseFloat(document.getElementById('paidAmount').value) || 0;
                remaining = parseFloat(document.getElementById('creditAmount').value) || 0;
                excess = parseFloat(document.getElementById('excessAmount').value) || 0;
            }

            if (excess > 0) {
                if (customer.balance < 0) {
                    const debtReduction = Math.min(excess, Math.abs(customer.balance));
                    customer.balance += debtReduction;
                    excess -= debtReduction;
                }
                if (excess > 0) {
                    customer.balance += excess;
                }
                await Storage.saveCustomer(customer);
            }

            if (remaining > 0) {
                customer.balance -= remaining;
                await Storage.saveCustomer(customer);
            }

            const user = Auth.getUser();
            const invoice = {
                id: 'INV-' + Date.now(),
                type: 'sale',
                customer: customer.name,
                customerId: customer.id,
                repId: user.repId || user.id,
                date: Utils.getToday(),
                total: net,
                paid: paid + (excess > 0 ? Math.min(excess, Math.abs(customer.balance)) : 0),
                remaining: remaining,
                discount,
                status: remaining === 0 ? 'paid' : 'partial',
                paymentMethod,
                items: cart
            };
            await Storage.saveInvoice(invoice);

            const reps = await Storage.getReps();
            const rep = reps.find(r => r.id == (user.repId || user.id));
            if (rep) {
                rep.sales = (rep.sales || 0) + net;
                await Storage.saveRep(rep);
            }

            cart.forEach(i => {
                const p = products.find(pr => pr.id === i.productId);
                p.units[i.unitIndex].stock -= i.quantity;
            });
            await Storage.saveProducts(products);

            if (paid > 0) {
                await Storage.saveTransaction({
                    id: Date.now(), date: Utils.getToday(), type: 'income', amount: paid,
                    description: `بيع - ${invoice.id}`, paymentMethod, reference: invoice.id
                });
            }

            alert(`✅ تم البيع بنجاح\nرقم الفاتورة: ${invoice.id}`);
            if (confirm('هل تريد طباعة الإيصال؟')) printReceipt();
            
            cart = [];
            renderCart();
            document.getElementById('discount').value = 0;
            document.getElementById('customerSearch').value = '';
            selectedCustomerId = null;
            document.getElementById('customerBalanceDisplay').textContent = '';
            renderProducts();
        }

        function printReceipt() {
            if (cart.length === 0) { alert('لا توجد عناصر للطباعة'); return; }
            const totals = {
                subtotal: cart.reduce((s, i) => s + i.price * i.quantity, 0),
                discount: parseFloat(document.getElementById('discount').value) || 0,
                net: parseFloat(document.getElementById('netTotal').textContent.replace(/[^0-9.-]+/g, ''))
            };
            const customer = customers.find(c => c.id === selectedCustomerId);
            PrintSystem.printThermalReceipt(cart, totals, customer);
        }

        function clearCart() { if(confirm('مسح السلة؟')) { cart = []; renderCart(); document.getElementById('discount').value = 0; } }
        function scanBarcode() {
            const code = prompt('ادخل الباركود:');
            if (!code) return;
            for (let p of products) {
                const idx = p.units.findIndex(u => u.barcode === code);
                if (idx >= 0) {
                    selectedProduct = p;
                    selectedUnitIndex = idx;
                    openUnitModal(p.id);
                    return;
                }
            }
            alert('لم يتم العثور على منتج');
        }
    </script>
</body>
</html>
