<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء والموردين - نظام التوزيع الغذائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #1abc9c;
            --light: #ecf0f1;
            --dark: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f5f6fa;
            color: #333;
        }

        /* شريط التنقل */
        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            padding: 0 20px;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), var(--info));
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h2 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 2px;
        }

        .logo-text p {
            color: var(--secondary);
            font-size: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--success), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .user-details h4 {
            color: var(--primary);
            margin-bottom: 3px;
        }

        .user-details p {
            color: #7f8c8d;
            font-size: 12px;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        /* الشريط الجانبي */
        .sidebar {
            background: white;
            width: 250px;
            height: calc(100vh - 70px);
            position: fixed;
            top: 70px;
            right: 0;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            padding: 20px 0;
            overflow-y: auto;
        }

        .menu {
            list-style: none;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--dark);
            text-decoration: none;
            transition: all 0.3s;
            border-right: 4px solid transparent;
            cursor: pointer;
            font-size: 15px;
        }

        .menu-item:hover {
            background: var(--light);
            color: var(--secondary);
            border-right-color: var(--secondary);
        }

        .menu-item.active {
            background: linear-gradient(to left, rgba(52, 152, 219, 0.1), transparent);
            color: var(--secondary);
            border-right-color: var(--secondary);
            font-weight: 600;
        }

        .menu-item i {
            width: 22px;
            text-align: center;
            font-size: 18px;
        }

        .menu-section {
            padding: 20px 25px 10px;
            color: #7f8c8d;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 250px;
            margin-top: 70px;
            padding: 25px;
            min-height: calc(100vh - 70px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light);
        }

        .page-title {
            color: var(--primary);
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: var(--secondary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--secondary);
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        /* علامات التبويب */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--light);
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 25px;
            background: none;
            border: none;
            color: #7f8c8d;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-size: 16px;
        }

        .tab-btn:hover {
            color: var(--secondary);
        }

        .tab-btn.active {
            color: var(--secondary);
            border-bottom-color: var(--secondary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* بطاقات الملخص */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-top: 5px solid;
        }

        .summary-card.customers-count { border-top-color: var(--secondary); }
        .summary-card.customers-balance { border-top-color: var(--warning); }
        .summary-card.customers-debt { border-top-color: var(--danger); }
        .summary-card.customers-credit { border-top-color: var(--success); }
        .summary-card.suppliers-count { border-top-color: var(--info); }
        .summary-card.suppliers-balance { border-top-color: var(--primary); }
        .summary-card.suppliers-debt { border-top-color: var(--danger); }
        .summary-card.suppliers-credit { border-top-color: var(--success); }

        .summary-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 3px;
        }

        .summary-label {
            color: #7f8c8d;
            font-size: 12px;
        }

        /* جدول */
        .table-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-box {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
            width: 200px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            color: var(--primary);
            font-weight: 600;
            text-align: right;
            padding: 12px 15px;
            border-bottom: 2px solid #eee;
            font-size: 14px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .balance-positive { color: var(--success); font-weight: bold; }
        .balance-negative { color: var(--danger); font-weight: bold; }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn.view { color: var(--secondary); }
        .action-btn.edit { color: var(--warning); }
        .action-btn.payment { color: var(--success); }
        .action-btn.debt { color: var(--danger); }
        .action-btn:hover { background: var(--light); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 14px;
            border-top: 1px solid #eee;
            margin-top: 30px;
        }

        @media (max-width: 992px) {
            .sidebar { width: 70px; }
            .sidebar .menu-text, .sidebar .menu-section { display: none; }
            .main-content { margin-right: 70px; }
            .menu-item { justify-content: center; padding: 15px; }
        }

        @media (max-width: 768px) {
            .tabs { flex-direction: column; }
            .tab-btn { justify-content: center; }
            .summary-cards { grid-template-columns: 1fr 1fr; }
            .table-header { flex-direction: column; gap: 10px; }
            .search-box input { width: 100%; }
            .navbar { padding: 0 10px; }
            .logo-text h2 { font-size: 16px; }
            .user-details { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><!-- كما في السابق --></nav>
    <aside class="sidebar"><!-- كما في السابق --></aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <i class="fas fa-user-tie"></i>
                <h1>العملاء والموردين</h1>
            </div>
            <div class="page-actions">
                <button class="btn btn-primary" onclick="openPartyModal()">
                    <i class="fas fa-plus"></i> إضافة جديد
                </button>
            </div>
        </div>

        <!-- علامات التبويب -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('customers')"><i class="fas fa-users"></i> العملاء</button>
            <button class="tab-btn" onclick="switchTab('suppliers')"><i class="fas fa-truck"></i> الموردين</button>
        </div>

        <!-- تبويب العملاء -->
        <div id="customersTab" class="tab-content active">
            <div class="summary-cards" id="customersSummary"></div>
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-list"></i> قائمة العملاء</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="بحث..." id="customerSearch" oninput="filterTable('customer')">
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                                <th>العنوان</th>
                                <th>الرصيد</th>
                                <th>آخر تعامل</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="customersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- تبويب الموردين -->
        <div id="suppliersTab" class="tab-content">
            <div class="summary-cards" id="suppliersSummary"></div>
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-list"></i> قائمة الموردين</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="بحث..." id="supplierSearch" oninput="filterTable('supplier')">
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>الهاتف</th>
                                <th>العنوان</th>
                                <th>الرصيد</th>
                                <th>آخر تعامل</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="suppliersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="footer"><p>© 2024 نظام إدارة التوزيع الغذائي | الإصدار 1.0.0</p></div>
    </main>

    <!-- Modal إضافة/تعديل -->
    <div class="modal" id="partyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-plus"></i> إضافة جديد</h3>
                <button class="close-btn" onclick="closePartyModal()">&times;</button>
            </div>
            <form id="partyForm" onsubmit="saveParty(event)">
                <input type="hidden" id="partyId">
                <input type="hidden" id="partyType" value="customer">
                <div class="form-group">
                    <label>النوع</label>
                    <select id="partyTypeSelect" required>
                        <option value="customer">عميل</option>
                        <option value="supplier">مورد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="partyName" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="partyPhone">
                </div>
                <div class="form-group">
                    <label>العنوان</label>
                    <input type="text" id="partyAddress">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="partyEmail">
                </div>
                <div class="form-group">
                    <label>الرصيد الافتتاحي (مدين = سالب، دائن = موجب)</label>
                    <input type="number" id="partyBalance" value="0" step="0.01">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closePartyModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal إضافة رصيد (دفعة/دين) -->
    <div class="modal" id="balanceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="balanceModalTitle">تسجيل معاملة</h3>
                <button class="close-btn" onclick="closeBalanceModal()">&times;</button>
            </div>
            <form id="balanceForm" onsubmit="saveTransaction(event)">
                <input type="hidden" id="transPartyId">
                <input type="hidden" id="transPartyType">
                <div class="form-group">
                    <label>نوع المعاملة</label>
                    <select id="transactionType" required>
                        <option value="payment">دفعة (تخفيض مديونية)</option>
                        <option value="debt">إضافة دين (مبيعات/مشتريات آجلة)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>المبلغ (ج)</label>
                    <input type="number" id="transactionAmount" min="0.01" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>التاريخ</label>
                    <input type="date" id="transactionDate" required>
                </div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <input type="text" id="transactionNotes" placeholder="رقم الفاتورة / تفاصيل">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeBalanceModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // بيانات مشتركة (عملاء وموردين)
        let parties = [
            { id: 1, type: 'customer', name: 'مطعم الشيف', phone: '0123456789', address: 'وسط البلد', email: 'chef@example.com', balance: -12500, lastTransaction: '2024-01-15' },
            { id: 2, type: 'customer', name: 'سوبرماركت النور', phone: '0123987654', address: 'شرق المدينة', email: 'nour@example.com', balance: 3400, lastTransaction: '2024-01-16' },
            { id: 3, type: 'supplier', name: 'مورد المواد الغذائية', phone: '0111222333', address: 'المنطقة الصناعية', email: 'supplier@example.com', balance: 15000, lastTransaction: '2024-01-10' },
            { id: 4, type: 'supplier', name: 'مخبز الأمل', phone: '0100999888', address: 'وسط البلد', email: 'bakery@example.com', balance: -2500, lastTransaction: '2024-01-12' },
            { id: 5, type: 'customer', name: 'مخبز الفردوس', phone: '0111222333', address: 'غرب المدينة', email: 'fardous@example.com', balance: -8500, lastTransaction: '2024-01-14' }
        ];

        let currentEditId = null;
        let currentTab = 'customers';

        document.addEventListener('DOMContentLoaded', function() {
            const userData = sessionStorage.getItem('user');
            if (!userData) {
                window.location.href = 'index.html';
                return;
            }
            const user = JSON.parse(userData);
            document.getElementById('userName').textContent = user.name;
            document.getElementById('loginTime').textContent = `دخل النظام: ${user.loginTime || 'اليوم'}`;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);

            document.getElementById('transactionDate').value = new Date().toISOString().split('T')[0];
            renderAll();
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
            renderAll();
        }

        function getPartiesByType(type) {
            return parties.filter(p => p.type === type);
        }

        function renderAll() {
            renderTable('customer');
            renderTable('supplier');
            updateSummary('customer');
            updateSummary('supplier');
        }

        function renderTable(type) {
            const data = getPartiesByType(type);
            const tbodyId = type === 'customer' ? 'customersTableBody' : 'suppliersTableBody';
            const tbody = document.getElementById(tbodyId);
            const searchInput = document.getElementById(type + 'Search');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

            const filtered = data.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                (p.phone && p.phone.includes(searchTerm))
            );

            tbody.innerHTML = filtered.map(p => {
                const balanceClass = p.balance >= 0 ? 'balance-positive' : 'balance-negative';
                let balanceText = p.balance.toLocaleString() + ' ج';
                if (type === 'customer') {
                    balanceText += p.balance < 0 ? ' (مدين)' : ' (دائن)';
                } else {
                    balanceText += p.balance > 0 ? ' (لنا)' : ' (علينا)';
                }
                return `
                    <tr>
                        <td><i class="fas ${type === 'customer' ? 'fa-user' : 'fa-truck'}"></i> ${p.name}</td>
                        <td>${p.phone || '-'}</td>
                        <td>${p.address || '-'}</td>
                        <td class="${balanceClass}">${balanceText}</td>
                        <td>${p.lastTransaction || '-'}</td>
                        <td class="action-buttons">
                            <button class="action-btn view" onclick="viewParty(${p.id})" title="تفاصيل"><i class="fas fa-eye"></i></button>
                            <button class="action-btn edit" onclick="editParty(${p.id})" title="تعديل"><i class="fas fa-edit"></i></button>
                            <button class="action-btn payment" onclick="openBalanceModal(${p.id}, 'payment')" title="تسجيل دفعة"><i class="fas fa-money-bill"></i></button>
                            <button class="action-btn debt" onclick="openBalanceModal(${p.id}, 'debt')" title="إضافة دين"><i class="fas fa-file-invoice"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTable(type) {
            renderTable(type);
        }

        function updateSummary(type) {
            const data = getPartiesByType(type);
            const count = data.length;
            const totalBalance = data.reduce((sum, p) => sum + p.balance, 0);
            const totalDebt = data.filter(p => p.balance < 0).reduce((sum, p) => sum + Math.abs(p.balance), 0);
            const totalCredit = data.filter(p => p.balance > 0).reduce((sum, p) => sum + p.balance, 0);

            const container = document.getElementById(type + 'sSummary');
            const isCustomer = type === 'customer';
            container.innerHTML = `
                <div class="summary-card ${type}s-count">
                    <div class="summary-icon"><i class="fas ${isCustomer ? 'fa-users' : 'fa-truck'}"></i></div>
                    <div class="summary-value">${count}</div>
                    <div class="summary-label">${isCustomer ? 'عدد العملاء' : 'عدد الموردين'}</div>
                </div>
                <div class="summary-card ${type}s-balance">
                    <div class="summary-icon"><i class="fas fa-scale-balanced"></i></div>
                    <div class="summary-value">${totalBalance.toLocaleString()} ج</div>
                    <div class="summary-label">صافي الرصيد</div>
                </div>
                <div class="summary-card ${type}s-debt">
                    <div class="summary-icon"><i class="fas fa-arrow-down"></i></div>
                    <div class="summary-value">${totalDebt.toLocaleString()} ج</div>
                    <div class="summary-label">${isCustomer ? 'مديونية العملاء' : 'مديونية لنا'}</div>
                </div>
                <div class="summary-card ${type}s-credit">
                    <div class="summary-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="summary-value">${totalCredit.toLocaleString()} ج</div>
                    <div class="summary-label">${isCustomer ? 'رصيد للعملاء' : 'مديونية علينا'}</div>
                </div>
            `;
        }

        function openPartyModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus"></i> إضافة جديد';
            document.getElementById('partyForm').reset();
            document.getElementById('partyId').value = '';
            document.getElementById('partyModal').style.display = 'flex';
        }

        function editParty(id) {
            const party = parties.find(p => p.id === id);
            if (!party) return;
            currentEditId = id;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل';
            document.getElementById('partyId').value = party.id;
            document.getElementById('partyTypeSelect').value = party.type;
            document.getElementById('partyName').value = party.name;
            document.getElementById('partyPhone').value = party.phone || '';
            document.getElementById('partyAddress').value = party.address || '';
            document.getElementById('partyEmail').value = party.email || '';
            document.getElementById('partyBalance').value = party.balance;
            document.getElementById('partyModal').style.display = 'flex';
        }

        function closePartyModal() {
            document.getElementById('partyModal').style.display = 'none';
        }

        function saveParty(event) {
            event.preventDefault();
            const id = document.getElementById('partyId').value;
            const type = document.getElementById('partyTypeSelect').value;
            const name = document.getElementById('partyName').value;
            const phone = document.getElementById('partyPhone').value;
            const address = document.getElementById('partyAddress').value;
            const email = document.getElementById('partyEmail').value;
            const balance = parseFloat(document.getElementById('partyBalance').value) || 0;

            if (id) {
                const party = parties.find(p => p.id == id);
                if (party) {
                    party.type = type;
                    party.name = name;
                    party.phone = phone;
                    party.address = address;
                    party.email = email;
                    party.balance = balance;
                }
            } else {
                const newId = Math.max(...parties.map(p => p.id), 0) + 1;
                parties.push({
                    id: newId, type, name, phone, address, email, balance,
                    lastTransaction: new Date().toISOString().split('T')[0]
                });
            }
            renderAll();
            closePartyModal();
        }

        function viewParty(id) {
            const party = parties.find(p => p.id === id);
            alert(`تفاصيل ${party.type === 'customer' ? 'العميل' : 'المورد'}: ${party.name}\nالرصيد: ${party.balance} ج`);
        }

        function openBalanceModal(partyId, transType) {
            const party = parties.find(p => p.id === partyId);
            if (!party) return;
            document.getElementById('transPartyId').value = partyId;
            document.getElementById('transPartyType').value = party.type;
            document.getElementById('transactionType').value = transType;
            document.getElementById('transactionAmount').value = '';
            document.getElementById('transactionNotes').value = '';
            document.getElementById('transactionDate').value = new Date().toISOString().split('T')[0];
            const title = transType === 'payment' ? 'تسجيل دفعة' : 'إضافة دين';
            document.getElementById('balanceModalTitle').innerHTML = `<i class="fas fa-${transType === 'payment' ? 'money-bill' : 'file-invoice'}"></i> ${title} - ${party.name}`;
            document.getElementById('balanceModal').style.display = 'flex';
        }

        function closeBalanceModal() {
            document.getElementById('balanceModal').style.display = 'none';
        }

        function saveTransaction(event) {
            event.preventDefault();
            const partyId = parseInt(document.getElementById('transPartyId').value);
            const transType = document.getElementById('transactionType').value;
            const amount = parseFloat(document.getElementById('transactionAmount').value);
            const date = document.getElementById('transactionDate').value;
            const notes = document.getElementById('transactionNotes').value;

            const party = parties.find(p => p.id === partyId);
            if (!party) return;

            if (transType === 'payment') {
                // دفعة: تزيد الرصيد (تخفض المديونية)
                party.balance += amount;
            } else {
                // دين: يقلل الرصيد (يزيد المديونية)
                party.balance -= amount;
            }
            party.lastTransaction = date;

            renderAll();
            closeBalanceModal();
            alert(`تم ${transType === 'payment' ? 'تسجيل دفعة' : 'إضافة دين'} بقيمة ${amount.toLocaleString()} ج`);
        }

        function logout() {
            if (confirm('تسجيل الخروج؟')) {
                sessionStorage.removeItem('user');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
