<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إنشاء متجر · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #f8fafc 50%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .circle-1, .circle-2 {
            position: absolute;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.06);
            z-index: 0;
        }
        .circle-1 { width: 400px; height: 400px; top: -150px; right: -150px; }
        .circle-2 { width: 300px; height: 300px; bottom: -100px; left: -100px; background: rgba(59, 130, 246, 0.04); }

        .signup-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.02);
            padding: 36px 28px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 2;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-area img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }
        .logo-area h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .logo-area p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
        }
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            background: #f8fafc;
            transition: 0.3s;
        }
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .input-group input::placeholder { color: #94a3b8; }
        .input-group select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 18px;
            padding-left: 40px;
        }

        .btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }
        .btn:hover {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 10px 25px rgba(5, 150, 105, 0.3);
            transform: translateY(-1px);
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
            background: #fef2f2;
            padding: 10px;
            border-radius: 10px;
        }

        .login-link {
            margin-top: 24px;
            text-align: center;
            font-size: 15px;
            color: #64748b;
        }
        .login-link a {
            color: #3b82f6;
            font-weight: 700;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }

        .footer-text {
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <div class="signup-card">
        <div class="logo-area">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <h1>أنشئ متجرك الخاص</h1>
            <p>نسخة تجريبية مجانية – بدون بطاقة ائتمان</p>
        </div>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="fullName" placeholder="اسمك الكامل" autocomplete="name" />
        </div>
        <div class="input-group">
            <i class="fas fa-store"></i>
            <input type="text" id="tenantName" placeholder="اسم المتجر (مطلوب)" />
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور (6 أحرف على الأقل)" autocomplete="new-password" />
        </div>
        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" placeholder="رقم الهاتف (اختياري)" autocomplete="tel" />
        </div>
        <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <select id="role">
                <option value="admin">مدير المتجر</option>
                <option value="rep">مندوب مبيعات</option>
            </select>
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="signupBtn">إنشاء المتجر مجاناً</button>
        <div class="login-link">
            لديك متجر بالفعل؟ <a href="./index.html">تسجيل الدخول</a>
        </div>
        <div class="footer-text">
            نظام نقاط بيع سحابي – متعدد المستأجرين
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>

    <script>
        (function() {
            const fullNameInput = document.getElementById('fullName');
            const tenantNameInput = document.getElementById('tenantName');
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const phoneInput = document.getElementById('phone');
            const roleSelect = document.getElementById('role');
            const signupBtn = document.getElementById('signupBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!window.App) {
                errorMsg.textContent = 'تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.';
                errorMsg.style.display = 'block';
                signupBtn.disabled = true;
                return;
            }

            async function performSignup() {
                const fullName = fullNameInput.value.trim();
                const tenantName = tenantNameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passInput.value;
                const phone = phoneInput.value.trim();
                const role = roleSelect.value;

                if (!fullName) { showError('يرجى إدخال اسمك الكامل'); return; }
                if (!tenantName) { showError('يرجى اختيار اسم لمتجرك'); return; }
                if (!email) { showError('يرجى إدخال البريد الإلكتروني'); return; }
                if (!password || password.length < 6) { showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

                signupBtn.disabled = true;
                signupBtn.textContent = 'جاري إنشاء المتجر...';
                errorMsg.style.display = 'none';

                try {
                    const result = await App.signup(email, password, fullName, role, tenantName, phone);
                    if (result.success) {
                        // توجيه المستخدم إلى الصفحة المناسبة بعد لحظة
                        setTimeout(() => {
                            window.location.href = role === 'rep' ? './pos.html' : './dashboard.html';
                        }, 500);
                    } else {
                        showError(result.message || 'فشل إنشاء المتجر');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'إنشاء المتجر مجاناً';
                }
            }

            function showError(msg) {
                errorMsg.textContent = '';
                errorMsg.appendChild(document.createTextNode(msg));
                errorMsg.style.display = 'block';
            }

            signupBtn.addEventListener('click', performSignup);
            roleSelect.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSignup(); });

            fullNameInput.focus();
        })();
    </script>
</body>
</html>
