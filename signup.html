<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>إنشاء حساب · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        #app-loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-family: 'Cairo', sans-serif;
        }
        body.loaded #app-loader { display: none; }
        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            display: none;
        }
        body.loaded .signup-card { display: block; }
        .logo {
            margin-bottom: 25px;
        }
        .logo img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 16px;
            text-align: right;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 45px 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: 0.2s;
        }
        .input-group select {
            padding: 12px 14px;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .login-link a {
            color: #3b82f6;
            font-weight: 600;
            text-decoration: none;
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body class="loading">
    <div id="app-loader">⏳ جاري التحقق من الجلسة...</div>

    <div class="signup-card" id="signupCard">
        <div class="logo">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <i class="fas fa-store" style="font-size:40px;color:#3b82f6;display:none;"></i>
        </div>
        <h2>إنشاء حساب جديد</h2>
        <p class="subtitle">أدخل بياناتك لإنشاء متجرك والبدء في استخدام حسابي</p>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="fullName" placeholder="الاسم الكامل" autocomplete="name" />
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password" />
        </div>
        <div class="input-group">
            <i class="fas fa-phone"></i>
            <input type="tel" id="phone" placeholder="رقم الهاتف (اختياري)" autocomplete="tel" />
        </div>
        <div class="input-group">
            <i class="fas fa-store-alt"></i>
            <input type="text" id="tenantName" placeholder="اسم المتجر (اختياري)" />
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="signupBtn">إنشاء الحساب</button>
        <div class="login-link">
            لديك حساب بالفعل؟ <a href="./index.html">تسجيل الدخول</a>
        </div>
    </div>

    <!-- تحميل المكتبات والسكربتات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (async function() {
            if (!window.App) {
                document.body.classList.remove('loading');
                alert('خطأ في تحميل التطبيق');
                return;
            }

            // 1. إذا كان المستخدم مسجلاً دخوله بالفعل، وجهه للمكان المناسب
            const user = await App.getCurrentUser();
            if (user) {
                let target = './dashboard.html';
                if (user.role === 'rep') target = './pos.html';
                else if (user.role === 'super_admin') target = './admin.html';
                window.location.href = target;
                return;
            }

            // 2. لا جلسة -> إظهار نموذج التسجيل
            document.body.classList.remove('loading');

            // 3. منطق إنشاء الحساب
            const fullNameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const phoneInput = document.getElementById('phone');
            const tenantInput = document.getElementById('tenantName');
            const signupBtn = document.getElementById('signupBtn');
            const errorMsg = document.getElementById('errorMsg');

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
            }
            function hideError() {
                errorMsg.style.display = 'none';
            }

            async function performSignup() {
                const fullName = fullNameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passInput.value;
                const phone = phoneInput.value.trim();
                const tenantName = tenantInput.value.trim();

                // تحقق بسيط
                if (!fullName || !email || !password) {
                    showError('يرجى ملء الاسم والبريد وكلمة المرور على الأقل');
                    return;
                }
                if (password.length < 6) {
                    showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                    return;
                }
                if (!email.includes('@')) {
                    showError('بريد إلكتروني غير صالح');
                    return;
                }

                signupBtn.disabled = true;
                signupBtn.textContent = 'جاري إنشاء الحساب...';
                hideError();

                try {
                    const result = await App.signup(email, password, fullName, 'admin', tenantName, phone);
                    if (result.success) {
                        // تم التسجيل وسيُعاد التوجيه تلقائياً من داخل App.signup (إذا كان هناك تسجيل دخول فوري)
                        // ولكن للتأكد، نعتمد على أن App.signup يقوم بتسجيل الدخول وإعادة التوجيه.
                        // في الكود الحالي لـ App.signup، بعد النجاح يوجه إلى dashboard.
                        window.location.href = './dashboard.html';
                    } else {
                        showError(result.message || 'فشل إنشاء الحساب');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'إنشاء الحساب';
                }
            }

            signupBtn.addEventListener('click', performSignup);

            // السماح بالضغط على Enter في الحقول
            const inputs = [fullNameInput, emailInput, passInput, phoneInput, tenantInput];
            inputs.forEach((input, idx) => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (idx < inputs.length - 1) {
                            inputs[idx + 1].focus();
                        } else {
                            performSignup();
                        }
                    }
                });
            });

            fullNameInput.focus();
        })();
    </script>
</body>
</html>
