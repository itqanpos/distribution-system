<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء متجر جديد · حسابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif; background: linear-gradient(145deg, #f0f4ff, #ffffff);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .signup-card {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); padding: 40px 32px; width: 100%; max-width: 420px;
        }
        h1 { text-align: center; font-size: 28px; font-weight: 800; color: #0f172a; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group .icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 16px;
        }
        .input-group input, .input-group select {
            width: 100%; padding: 14px 48px 14px 16px;
            border: 1px solid #cbd5e1; border-radius: 16px;
            font-family: 'Cairo', sans-serif; font-size: 16px; background: rgba(255,255,255,0.7);
        }
        .input-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
            border: none; border-radius: 16px; padding: 14px; width: 100%;
            font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 18px;
            cursor: pointer; transition: 0.3s; margin-top: 8px;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(37,99,235,0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-link { text-align: center; margin-top: 24px; color: #64748b; }
        .login-link a { color: #3b82f6; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h1>إنشاء متجر جديد</h1>
        <div class="input-group">
            <span class="icon"><i class="fas fa-user"></i></span>
            <input type="text" id="fullName" placeholder="الاسم الكامل" autocomplete="name">
        </div>
        <div class="input-group">
            <span class="icon"><i class="fas fa-envelope"></i></span>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email">
        </div>
        <div class="input-group">
            <span class="icon"><i class="fas fa-phone"></i></span>
            <input type="tel" id="phone" placeholder="رقم الهاتف (اختياري)">
        </div>
        <div class="input-group">
            <span class="icon"><i class="fas fa-store"></i></span>
            <input type="text" id="storeName" placeholder="اسم المتجر">
        </div>
        <div class="input-group">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password">
        </div>
        <div class="input-group">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="passwordConfirm" placeholder="تأكيد كلمة المرور">
        </div>
        <button class="btn" id="signupBtn">إنشاء المتجر</button>
        <div class="login-link">
            لديك حساب بالفعل؟ <a href="./index.html">تسجيل الدخول</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/core/db-local.js"></script>
    <script src="./js/core/supabase.js"></script>
    <script src="./js/core/toast.js"></script>
    <script>
        (function() {
            const btn = document.getElementById('signupBtn');
            btn.addEventListener('click', async () => {
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const storeName = document.getElementById('storeName').value.trim();
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('passwordConfirm').value;

                if (!fullName || !email || !storeName || !password) {
                    return Toast.warning('جميع الحقول مطلوبة');
                }
                if (password !== passwordConfirm) {
                    return Toast.warning('كلمتا المرور غير متطابقتين');
                }
                if (password.length < 6) {
                    return Toast.warning('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                }

                btn.disabled = true;
                btn.textContent = 'جاري الإنشاء...';

                try {
                    const result = await App.signup(email, password, fullName, 'admin', storeName, phone);
                    if (result.success) {
                        Toast.success('تم إنشاء المتجر بنجاح! جاري تسجيل الدخول...');
                        setTimeout(() => window.location.href = './dashboard.html', 1500);
                    } else {
                        Toast.error(result.message);
                    }
                } catch (e) {
                    Toast.error('حدث خطأ غير متوقع');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'إنشاء المتجر';
                }
            });
        })();
    </script>
</body>
</html>
