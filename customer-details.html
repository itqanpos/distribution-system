<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العميل - نظام التوزيع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نفس التنسيقات الأساسية */
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f39c12; --info: #1abc9c; --light: #ecf0f1; --dark: #34495e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f6fa; }
        .navbar { background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.1); padding: 0 20px; position: fixed; top: 0; right: 0; left: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon { background: linear-gradient(135deg, var(--secondary), var(--info)); color: white; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text h2 { color: var(--primary); font-size: 20px; }
        .logo-text p { color: var(--secondary); font-size: 12px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, var(--success), var(--info)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
        .user-details h4 { color: var(--primary); }
        .user-details p { color: #7f8c8d; font-size: 12px; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .main-content { margin-top: 70px; padding: 25px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--light); }
        .page-title { color: var(--primary); font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--secondary); color: white; }
        .summary-cards { display: grid; grid-template-columns: repeat(3,1fr); gap:20px; margin-bottom:30px; }
        .card { background: white; border-radius:12px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
        .table-container { background: white; border-radius:12px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05); }
        table { width:100%; border-collapse:collapse; }
        th { background:#f8f9fa; color:var(--primary); padding:12px 15px; text-align:right; }
        td { padding:12px 15px; border-bottom:1px solid #eee; }
        .footer { text-align:center; padding:20px; color:#7f8c8d; border-top:1px solid #eee; margin-top:30px; }
        .payment-form { background: white; border-radius:12px; padding:20px; margin-top:30px; display: flex; gap:15px; align-items: flex-end; }
        .payment-form input { padding:10px; border:1px solid #ddd; border-radius:8px; }
    </style>
</head>
<body>
    <nav class="navbar"><!-- نفس navbar --></nav>
    <main class="main-content">
        <div class="page-header">
            <div class="page-title"><i class="fas fa-user"></i><h1 id="customerName">تفاصيل العميل</h1></div>
            <button class="btn btn-primary" onclick="history.back()"><i class="fas fa-arrow-right"></i> رجوع</button>
        </div>
        <div class="summary-cards">
            <div class="card"><h3>إجمالي المبيعات</h3><p id="totalSales">0 ج</p></div>
            <div class="card"><h3>إجمالي المدفوعات</h3><p id="totalPayments">0 ج</p></div>
            <div class="card"><h3>الرصيد الحالي</h3><p id="balance">0 ج</p></div>
        </div>
        <div class="table-container">
            <h3>الفواتير</h3>
            <table><thead><tr><th>رقم الفاتورة</th><th>التاريخ</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr></thead>
            <tbody id="invoicesTable"></tbody></table>
        </div>
        <div class="payment-form">
            <input type="number" id="paymentAmount" placeholder="المبلغ" style="flex:1;">
            <input type="date" id="paymentDate" value="2024-01-20">
            <button class="btn btn-primary" onclick="recordPayment()">تسجيل دفعة</button>
        </div>
        <div class="footer"><p>© 2024 نظام إدارة التوزيع الغذائي</p></div>
    </main>
    <script>
        // بيانات افتراضية للعميل (يتم جلبها من localStorage أو API)
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('id');
        // بيانات افتراضية
        let customer = { id: 1, name: 'مطعم الشيف', totalSales: 12500, totalPayments: 10000 };
        let invoices = [
            { id: 'INV-001', date: '2024-01-10', total: 5000, paid: 5000, remaining: 0 },
            { id: 'INV-002', date: '2024-01-15', total: 7500, paid: 5000, remaining: 2500 }
        ];

        function updateUI() {
            document.getElementById('customerName').textContent = customer.name;
            const totalSales = invoices.reduce((sum, inv) => sum + inv.total, 0);
            const totalPayments = invoices.reduce((sum, inv) => sum + inv.paid, 0);
            const balance = totalSales - totalPayments;
            document.getElementById('totalSales').textContent = totalSales + ' ج';
            document.getElementById('totalPayments').textContent = totalPayments + ' ج';
            document.getElementById('balance').textContent = balance + ' ج';

            const tbody = document.getElementById('invoicesTable');
            tbody.innerHTML = '';
            invoices.forEach(inv => {
                tbody.innerHTML += `<tr><td>${inv.id}</td><td>${inv.date}</td><td>${inv.total} ج</td><td>${inv.paid} ج</td><td>${inv.remaining} ج</td></tr>`;
            });
        }

        function recordPayment() {
            const amount = parseFloat(document.getElementById('paymentAmount').value);
            if (!amount || amount <= 0) { alert('أدخل مبلغ صحيح'); return; }
            // في الواقع يتم اختيار الفاتورة المناسبة، هنا نبسط بإضافة دفعة لأول فاتورة غير مدفوعة
            const unpaidInv = invoices.find(inv => inv.remaining > 0);
            if (unpaidInv) {
                const pay = Math.min(amount, unpaidInv.remaining);
                unpaidInv.paid += pay;
                unpaidInv.remaining = unpaidInv.total - unpaidInv.paid;
                alert(`تم تسجيل دفعة بقيمة ${pay} ج للفاتورة ${unpaidInv.id}`);
                updateUI();
            } else {
                alert('لا توجد فواتير مستحقة');
            }
            document.getElementById('paymentAmount').value = '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('user') || '{"name":"مدير"}');
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);
            // في الحقيقة نبحث عن العميل حسب id
            updateUI();
        });

        function logout() { sessionStorage.removeItem('user'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
