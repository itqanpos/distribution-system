<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول · نظام التوزيع الغذائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --surface: #ffffff;
            --border-light: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            animation: fadeSlide 0.5s;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), #06b6d4);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
        }
        h2 {
            color: var(--primary);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 16px 52px 16px 18px;
            border: 2px solid var(--border-light);
            border-radius: 18px;
            font-size: 16px;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: var(--secondary);
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover { background: #2563eb; }
        .error-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .demo-section {
            margin-top: 28px;
            text-align: center;
        }
        .demo-label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .demo-buttons {
            display: flex;
            gap: 12px;
        }
        .demo-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border-light);
            border-radius: 14px;
            background: white;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .demo-btn.admin { color: #2563eb; }
        .demo-btn.rep { color: #16a34a; }
        .demo-btn:hover { background: #f8fafc; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-truck"></i></div>
            <h2>نظام التوزيع الغذائي</h2>
            <p class="subtitle">الرجاء إدخال بيانات الدخول</p>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="اسم المستخدم" value="admin" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" value="123456" required>
            </div>
            <div class="error-msg" id="loginError">بيانات الدخول غير صحيحة</div>
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
        </form>
        <div class="demo-section">
            <p class="demo-label">حسابات تجريبية</p>
            <div class="demo-buttons">
                <button class="demo-btn admin" onclick="fillDemo('admin')"><i class="fas fa-user-tie"></i> مدير</button>
                <button class="demo-btn rep" onclick="fillDemo('rep')"><i class="fas fa-user"></i> مندوب</button>
            </div>
        </div>
    </div>

    <script>
        // تحويل تلقائي إذا كان المستخدم مسجلاً بالفعل
        if (App.getCurrentUser()) {
            const user = App.getCurrentUser();
            window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
                return;
            }

            const result = await App.login(username, password);
            if (result.success) {
                window.location.href = result.redirectUrl;
            } else {
                errorEl.style.display = 'block';
                errorEl.textContent = result.message;
            }
        });

        function fillDemo(role) {
            document.getElementById('username').value = role === 'admin' ? 'admin' : 'rep1';
            document.getElementById('password').value = '123456';
            document.getElementById('loginError').style.display = 'none';
        }
        window.fillDemo = fillDemo;
    </script>
</body>
</html>
