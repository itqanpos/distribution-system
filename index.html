<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #f0f4f8 50%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* زخارف خلفية */
        body::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(59, 130, 246, 0.08);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -60px;
            width: 300px;
            height: 300px;
            background: rgba(16, 185, 129, 0.06);
            border-radius: 50%;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
            padding: 40px 32px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-area img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 12px;
        }
        .logo-area h1 {
            font-size: 26px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .logo-area p {
            color: #64748b;
            font-size: 15px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            background: #f8fafc;
            transition: 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .input-group input::placeholder {
            color: #94a3b8;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
            background: #fef2f2;
            padding: 8px;
            border-radius: 10px;
        }

        .signup-link {
            margin-top: 24px;
            text-align: center;
            font-size: 15px;
            color: #64748b;
        }
        .signup-link a {
            color: #3b82f6;
            font-weight: 700;
            text-decoration: none;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <h1>حسابي</h1>
            <p>نظام إدارة المبيعات</p>
        </div>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="loginBtn">دخول</button>
        <div class="signup-link">
            ليس لديك حساب؟ <a href="./signup.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (function() {
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // إذا كان App غير محمل (اتصال بطيء) نعرض رسالة
            if (!window.App) {
                errorMsg.textContent = 'خطأ في تحميل التطبيق. تأكد من اتصالك بالإنترنت.';
                errorMsg.style.display = 'block';
                loginBtn.disabled = true;
                return;
            }

            // تحقق من الجلسة بهدوء دون حظر الواجهة
            App.getCurrentUser().then(user => {
                if (user) {
                    let target = './dashboard.html';
                    if (user.role === 'rep') target = './pos.html';
                    else if (user.role === 'super_admin') target = './admin.html';
                    window.location.href = target;
                }
            }).catch(() => {});

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';
                errorMsg.style.display = 'none';

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                }
            }

            function showError(msg) {
                errorMsg.textContent = '';
                errorMsg.appendChild(document.createTextNode(msg));
                errorMsg.style.display = 'block';
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passInput.focus(); });

            emailInput.focus();

            // تسجيل Service Worker إن أمكن
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }
        })();
    </script>
</body>
</html>
