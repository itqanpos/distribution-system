<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base href="/distribution-system/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام التوزيع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #1e293b, #334155); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; border-radius: 28px; padding: 40px 32px; width: 100%; max-width: 440px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo i { font-size: 48px; background: linear-gradient(135deg, #3498db, #1abc9c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #7f8c8d; }
        .input-group input { width: 100%; padding: 16px 48px 16px 16px; border: 2px solid #eef2f6; border-radius: 16px; font-size: 16px; }
        .btn { width: 100%; padding: 16px; background: #3498db; color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .demo-btns { display: flex; gap: 10px; margin-top: 20px; }
        .demo-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 12px; background: white; cursor: pointer; }
        .error { color: #e74c3c; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo"><i class="fas fa-truck"></i></div>
    <h2>نظام التوزيع الغذائي</h2>
    <form id="loginForm">
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="username" placeholder="Username" value="admin" required></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password" value="123456" required></div>
        <div class="error" id="loginError">Invalid username or password</div>
        <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    <div class="demo-btns">
        <button class="demo-btn" onclick="fillDemo('admin')"><i class="fas fa-user-tie"></i> Admin</button>
        <button class="demo-btn" onclick="fillDemo('rep')"><i class="fas fa-user"></i> Rep</button>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="./js/firebase-init.js"></script>
<script src="./js/utils.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/ui.js"></script>
<script>
    if (Auth.isAuthenticated()) {
        window.location.href = Auth.getRedirectUrl(Auth.getUser().role);
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const res = await Auth.login(username, password);
        if (res.success) window.location.href = res.redirectUrl;
        else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').textContent = res.message;
        }
    });
    function fillDemo(role) {
        document.getElementById('username').value = role === 'admin' ? 'admin' : 'rep1';
        document.getElementById('password').value = '123456';
        document.getElementById('loginError').style.display = 'none';
    }
</script>
</body>
</html>
