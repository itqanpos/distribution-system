<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base href="/distribution-system/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - نظام التوزيع الغذائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="./manifest.json">
    <style>
        /* نفس تنسيقات صفحة تسجيل الدخول السابقة */
        :root { --primary: #1e293b; --secondary: #3b82f6; --accent: #10b981; --surface: #ffffff; --text-primary: #0f172a; --text-secondary: #64748b; --border-light: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, var(--primary) 0%, #334155 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: var(--surface); border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 440px; padding: 40px 32px; }
        .logo-icon { background: linear-gradient(135deg, var(--secondary) 0%, var(--accent) 100%); color: white; width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; }
        .input-icon { position: relative; margin-bottom: 20px; }
        .input-icon i { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        .input-icon input { width: 100%; padding: 16px 52px 16px 18px; border: 2px solid var(--border-light); border-radius: 16px; font-size: 16px; }
        .login-btn { width: 100%; padding: 16px; background: var(--secondary); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; }
        .demo-btn { flex: 1; padding: 12px; border: 1.5px solid var(--border-light); border-radius: 12px; background: var(--surface); cursor: pointer; }
        .error-message { color: #ef4444; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-icon"><i class="fas fa-truck"></i></div>
        <h2 style="text-align:center; margin-bottom:10px;">نظام التوزيع الغذائي</h2>
        <p style="text-align:center; color:#64748b; margin-bottom:30px;">الرجاء إدخال بيانات الدخول</p>
        <form id="loginForm">
            <div class="input-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="اسم المستخدم" value="admin" required>
            </div>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" value="123456" required>
            </div>
            <div class="error-message" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
        </form>
        <div style="margin-top:25px; text-align:center;">
            <p style="color:#94a3b8; margin-bottom:12px;">حسابات تجريبية</p>
            <div style="display:flex; gap:10px;">
                <button class="demo-btn" onclick="fillDemo('admin')"><i class="fas fa-user-tie"></i> مدير</button>
                <button class="demo-btn" onclick="fillDemo('rep')"><i class="fas fa-user"></i> مندوب</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <!-- التهيئة المركزية -->
    <script src="./js/firebase-init.js"></script>
    <!-- الأدوات -->
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/ui.js"></script>

    <script>
        // منع الدخول إذا كان مسجلاً مسبقاً
        if (Auth.isAuthenticated()) {
            const user = Auth.getUser();
            window.location.href = Auth.getRedirectUrl(user.role);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
                return;
            }

            const result = await Auth.login(username, password);
            if (result.success) {
                window.location.href = result.redirectUrl;
            } else {
                errorEl.style.display = 'block';
                errorEl.textContent = result.message;
            }
        }

        function fillDemo(role) {
            document.getElementById('username').value = role === 'admin' ? 'admin' : 'rep1';
            document.getElementById('password').value = '123456';
            document.getElementById('loginError').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
