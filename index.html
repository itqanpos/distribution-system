<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول · نظام التوزيع الغذائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --surface: #ffffff;
            --border-light: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--surface);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 460px;
            padding: 32px 28px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), #06b6d4);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
        }
        h2 { color: var(--primary); font-size: 24px; font-weight: 700; }
        .subtitle { color: #64748b; margin-bottom: 20px; font-size: 14px; }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: var(--secondary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }
        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 15px 50px 15px 16px;
            border: 2px solid var(--border-light);
            border-radius: 16px;
            font-size: 15px;
        }
        .input-group input:focus { border-color: var(--secondary); outline: none; }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #2563eb; }
        .error-msg {
            color: var(--danger);
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .success-msg {
            color: var(--success);
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .demo-section {
            margin-top: 24px;
            text-align: center;
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
        }
        .demo-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .demo-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border-light);
            border-radius: 14px;
            background: white;
            font-weight: 600;
            cursor: pointer;
        }
        .demo-btn.admin { color: #2563eb; }
        .demo-btn.rep { color: #16a34a; }
        .note {
            font-size: 12px;
            color: #64748b;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-truck"></i></div>
            <h2>نظام التوزيع الغذائي</h2>
            <p class="subtitle">منصة إدارة المبيعات والمخزون</p>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
            <button class="tab-btn" onclick="switchTab('signup')">إنشاء حساب</button>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div id="loginPanel" class="form-panel active">
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم" value="admin" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="كلمة المرور" value="123456" required>
                </div>
                <div class="error-msg" id="loginError">بيانات الدخول غير صحيحة</div>
                <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
            </form>
        </div>

        <!-- نموذج إنشاء حساب -->
        <div id="signupPanel" class="form-panel">
            <form id="signupForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupUsername" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" id="signupFullName" placeholder="الاسم الكامل" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="كلمة المرور" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <select id="signupRole" style="width:100%; padding:15px 16px; border:2px solid var(--border-light); border-radius:16px; font-size:15px; background:white;">
                        <option value="admin">مدير</option>
                        <option value="rep" selected>مندوب</option>
                    </select>
                </div>
                <div class="error-msg" id="signupError">حدث خطأ</div>
                <div class="success-msg" id="signupSuccess">تم إنشاء الحساب بنجاح!</div>
                <button type="submit" class="submit-btn"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
            </form>
            <p class="note"><i class="fas fa-info-circle"></i> سيتم إنشاء حساب جديد ويمكنك تسجيل الدخول مباشرة.</p>
        </div>

        <!-- حسابات تجريبية -->
        <div class="demo-section">
            <p style="color:#64748b; margin-bottom:8px;">حسابات تجريبية</p>
            <div class="demo-buttons">
                <button class="demo-btn admin" onclick="fillDemo('admin')"><i class="fas fa-user-tie"></i> مدير</button>
                <button class="demo-btn rep" onclick="fillDemo('rep')"><i class="fas fa-user"></i> مندوب</button>
            </div>
        </div>
    </div>

    <script>
        // التبديل بين التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('signupPanel').classList.add('active');
            }
            // إخفاء رسائل الخطأ
            document.querySelectorAll('.error-msg, .success-msg').forEach(el => el.style.display = 'none');
        }

        // تعبئة بيانات تجريبية
        function fillDemo(role) {
            document.getElementById('loginUsername').value = role === 'admin' ? 'admin' : 'rep1';
            document.getElementById('loginPassword').value = '123456';
            switchTab('login');
        }

        // تحويل تلقائي إذا كان مسجلاً بالفعل
        if (App.getCurrentUser()) {
            const user = App.getCurrentUser();
            window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
        }

        // === تسجيل الدخول ===
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
                return;
            }

            const result = await App.login(username, password);
            if (result.success) {
                window.location.href = result.redirectUrl;
            } else {
                errorEl.style.display = 'block';
                errorEl.textContent = result.message;
            }
        });

        // === إنشاء حساب جديد ===
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value.trim();
            const fullName = document.getElementById('signupFullName').value.trim();
            const password = document.getElementById('signupPassword').value;
            const role = document.getElementById('signupRole').value;
            
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !fullName || !password) {
                errorEl.style.display = 'block';
                errorEl.textContent = 'جميع الحقول مطلوبة';
                return;
            }

            try {
                // التحقق من عدم وجود مستخدم بنفس الاسم
                const { data: existing } = await supabase
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .single();

                if (existing) {
                    errorEl.style.display = 'block';
                    errorEl.textContent = 'اسم المستخدم موجود مسبقاً';
                    return;
                }

                // إنشاء معرف فريد
                const userId = 'USR-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
                
                const { error } = await supabase
                    .from('users')
                    .insert([{
                        id: userId,
                        username: username,
                        full_name: fullName,
                        password: password,
                        role: role,
                        status: 'active'
                    }]);

                if (error) throw error;

                successEl.style.display = 'block';
                document.getElementById('signupForm').reset();
                
                // بعد ثانيتين، حوّل إلى تبويب تسجيل الدخول
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = password;
                }, 1500);
            } catch (err) {
                console.error(err);
                errorEl.style.display = 'block';
                errorEl.textContent = 'فشل إنشاء الحساب: ' + err.message;
            }
        });

        window.switchTab = switchTab;
        window.fillDemo = fillDemo;
    </script>
</body>
</html>
