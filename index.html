<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- يمكنك ربط ملف CSS خارجي بدلاً من الأنماط الداخلية -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
        }
        #app-loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-family: 'Cairo', sans-serif;
        }
        body.loaded #app-loader { display: none; }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            display: none; /* تظهر بعد التحقق */
        }
        body.loaded .login-card { display: block; }
        .logo {
            margin-bottom: 25px;
        }
        .logo img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: right;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 14px 45px 14px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: #2563eb; }
        .signup-link {
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .signup-link a {
            color: #3b82f6;
            font-weight: 600;
            text-decoration: none;
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body class="loading">
    <div id="app-loader">⏳ جاري التحقق من الجلسة...</div>

    <div class="login-card" id="loginCard">
        <div class="logo">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <i class="fas fa-store" style="font-size:40px;color:#3b82f6;display:none;"></i>
        </div>
        <h2>تسجيل الدخول</h2>
        <p class="subtitle">أدخل بيانات حسابك للوصول إلى النظام</p>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="loginBtn">دخول</button>
        <div class="signup-link">
            ليس لديك حساب؟ <a href="./signup.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <!-- تحميل المكتبات والسكربتات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (async function() {
            // تأكد من وجود App
            if (!window.App) {
                document.body.classList.remove('loading');
                alert('خطأ في تحميل التطبيق');
                return;
            }

            // 1. تحقق من وجود جلسة صالحة
            const user = await App.getCurrentUser();
            if (user) {
                // الجلسة صالحة -> توجيه فوري للصفحة المناسبة
                let target = './dashboard.html';
                if (user.role === 'rep') target = './pos.html';
                else if (user.role === 'super_admin') target = './admin.html';
                window.location.href = target;
                return; // أوقف التحميل
            }

            // 2. لا توجد جلسة -> أظهر نموذج الدخول
            document.body.classList.remove('loading');

            // 3. أحداث تسجيل الدخول
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // تسجيل الدخول عند الضغط على زر الدخول أو Enter
            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';
                errorMsg.style.display = 'none';

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                }
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performLogin();
            });
            emailInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') passInput.focus();
            });

            // تركيز أول حقل
            emailInput.focus();
        })();
    </script>
</body>
</html>
