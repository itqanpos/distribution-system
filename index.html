<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>

    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- الأنماط -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.06);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية النجوم */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.5); }
        }

        /* هالات متحركة */
        .aura {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
            animation: rotateAura 30s linear infinite;
        }
        .aura-1 {
            background: var(--primary);
            top: -150px;
            right: -150px;
        }
        .aura-2 {
            background: var(--secondary);
            bottom: -150px;
            left: -150px;
            animation-direction: reverse;
        }
        @keyframes rotateAura {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الحاوية الرئيسية */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
            animation: cardEntry 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 44px 36px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        /* الشعار */
        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 28px -8px rgba(99,102,241,0.5);
            animation: pulse 2.5s ease-in-out infinite;
            transition: transform 0.3s;
        }
        .logo-icon:hover { transform: scale(1.05) rotate(-2deg); }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 12px 28px -8px rgba(99,102,241,0.4); }
            50% { box-shadow: 0 16px 36px -8px rgba(99,102,241,0.7); }
        }
        .logo-icon i {
            font-size: 40px;
            color: white;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }
        .logo-area h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .logo-area .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }

        /* رسالة الاتصال */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            animation: fadeSlideDown 0.4s ease;
        }
        .alert.show { display: flex; }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert a {
            color: #f87171;
            font-weight: 700;
            text-decoration: none;
            margin-right: auto;
            cursor: pointer;
            white-space: nowrap;
        }
        .alert a:hover { text-decoration: underline; }

        /* الحقول */
        .input-group {
            position: relative;
            margin-bottom: 22px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 48px 15px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            color: var(--text);
            transition: var(--transition);
            outline: none;
            backdrop-filter: blur(4px);
        }
        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
        }
        .input-group input::placeholder { color: #64748b; }
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
            transition: var(--transition);
            pointer-events: none;
        }
        .input-group input:focus ~ .input-icon,
        .input-group input:not(:placeholder-shown) ~ .input-icon {
            color: var(--primary);
        }

        /* زر الدخول */
        .btn {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px -8px rgba(99,102,241,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            box-shadow: 0 16px 35px -8px rgba(99,102,241,0.6);
            transform: translateY(-2px);
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 10px 25px -8px rgba(99,102,241,0.3);
        }
        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: inline-block; }

        /* رابط التسجيل */
        .signup-link {
            margin-top: 28px;
            text-align: center;
            font-size: 15px;
            color: var(--text-muted);
        }
        .signup-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s;
        }
        .signup-link a:hover { color: #818cf8; }

        /* تجاوب الموبايل */
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; border-radius: 20px; }
            .logo-icon { width: 64px; height: 64px; border-radius: 18px; }
            .logo-icon i { font-size: 32px; }
            .logo-area h1 { font-size: 26px; }
            .input-group input { padding: 14px 44px 14px 14px; font-size: 15px; }
            .btn { padding: 14px; font-size: 17px; }
        }
    </style>
</head>
<body>
    <!-- خلفية ديناميكية -->
    <div class="stars" id="starsContainer"></div>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- الشعار -->
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-store-alt"></i>
                </div>
                <h1>حسابي</h1>
                <p class="subtitle">نظام إدارة الأعمال الذكي</p>
            </div>

            <!-- رسالة خطأ الاتصال -->
            <div class="alert" id="connectionAlert">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="alertMsg">تعذر الاتصال بالخادم</span>
                <a onclick="location.reload()">إعادة المحاولة</a>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" inputmode="email" autocorrect="off" autocapitalize="none">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
            </div>

            <button class="btn" id="loginBtn">
                <span class="btn-text">تسجيل الدخول</span>
                <span class="spinner"></span>
            </button>

            <div class="signup-link">
                ليس لديك متجر؟ <a href="./signup.html">أنشئ متجرك الآن</a>
            </div>
        </div>
    </div>

    <!-- الاعتماديات (الترتيب مهم) -->
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>

    <script>
        (() => {
            // ========== إنشاء النجوم ==========
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 70; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${Math.random() * 3 + 1}px;
                    height: ${Math.random() * 3 + 1}px;
                    --duration: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 4}s;
                `;
                starsContainer.appendChild(star);
            }

            // ========== عناصر DOM ==========
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('connectionAlert');
            const alertMsg = document.getElementById('alertMsg');

            // ========== دوال مساعدة ==========
            function showAlert(message, showRetry = true) {
                alertMsg.textContent = message;
                alertBox.classList.add('show');
                if (!showRetry) {
                    alertBox.querySelector('a').style.display = 'none';
                } else {
                    alertBox.querySelector('a').style.display = '';
                }
            }
            function hideAlert() {
                alertBox.classList.remove('show');
            }

            function showToast(msg, type = 'error') {
                // استخدام Toast إذا كان محملاً
                if (window.Toast) {
                    Toast[type]?.(msg) || Toast.error(msg);
                } else {
                    alert(msg);
                }
            }

            // ========== انتظار تحميل النواة ==========
            function waitForApp(timeoutMs = 8000) {
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    const check = () => {
                        if (window.App && window.App.login && window.App.getCurrentUser) {
                            resolve();
                        } else if (Date.now() - start > timeoutMs) {
                            reject(new Error('انتهت مهلة الاتصال'));
                        } else {
                            setTimeout(check, 200);
                        }
                    };
                    check();
                });
            }

            // ========== بدء التشغيل ==========
            async function init() {
                loginBtn.disabled = true;
                loginBtn.querySelector('.btn-text').textContent = 'جاري الاتصال...';

                try {
                    await waitForApp();
                    // النواة جاهزة
                    hideAlert();
                    loginBtn.disabled = false;
                    loginBtn.querySelector('.btn-text').textContent = 'تسجيل الدخول';

                    // إعادة توجيه المستخدم المسجل
                    const user = await App.getCurrentUser();
                    if (user) {
                        let target = './dashboard.html';
                        if (user.role === 'rep') target = './pos.html';
                        else if (user.role === 'super_admin') target = './admin.html';
                        window.location.href = target;
                    }
                } catch (err) {
                    // فشل الاتصال
                    showAlert('تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                    loginBtn.disabled = true;
                    loginBtn.querySelector('.btn-text').textContent = 'تعذر الاتصال';
                }
            }

            init();

            // ========== عملية تسجيل الدخول ==========
            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showToast('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'warning');
                    return;
                }

                // التحقق من وجود App مرة أخرى
                if (!window.App || !window.App.login) {
                    showAlert('الاتصال غير متاح حاليًا، جارٍ إعادة المحاولة...');
                    try {
                        await waitForApp(4000);
                        hideAlert();
                    } catch (e) {
                        showAlert('فشل الاتصال. الرجاء التحقق من الإنترنت والمحاولة لاحقًا.');
                        return;
                    }
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showToast(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showToast(e.message || 'حدث خطأ غير متوقع');
                } finally {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            }

            // ========== الأحداث ==========
            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', e => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', e => { if (e.key === 'Enter') passInput.focus(); });

            // تركيز أول حقل
            emailInput.focus();

            // ========== Service Worker ==========
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }

            // ========== حدث الاتصال بالإنترنت ==========
            window.addEventListener('online', () => {
                hideAlert();
                if (loginBtn.disabled && loginBtn.querySelector('.btn-text').textContent === 'تعذر الاتصال') {
                    init(); // إعادة محاولة التهيئة
                }
            });
            window.addEventListener('offline', () => {
                showAlert('أنت غير متصل بالإنترنت', false);
            });
        })();
    </script>
</body>
</html>
