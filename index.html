<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #ffffff 50%, #e8f0fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        /* خلفية زخرفية */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
            background: #3b82f6;
            z-index: 0;
        }
        .bg-shape-1 { width: 500px; height: 500px; top: -200px; right: -200px; }
        .bg-shape-2 { width: 400px; height: 400px; bottom: -150px; left: -150px; background: #10b981; }

        /* حاوية البطاقة */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), inset 0 0 0 1px rgba(255,255,255,0.5);
            padding: 36px 28px;
            position: relative;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-area img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 12px;
        }
        .logo-area h1 {
            font-size: 27px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .logo-area .subtitle {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        /* حقول الإدخال */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }
        .input-group .icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 14px 46px 14px 16px;
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: 0.3s;
            color: #1e293b;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .input-group input::placeholder { color: #94a3b8; }

        /* زر تسجيل الدخول */
        .login-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 14px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 6px;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* رسالة الخطأ داخل البطاقة */
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 14px;
            padding: 12px 16px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #dc2626;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.3s;
            pointer-events: none;
        }
        .error-box.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .error-box i.fa-times-circle {
            font-size: 18px;
            flex-shrink: 0;
        }
        .error-box .error-close {
            margin-right: auto;
            cursor: pointer;
            color: #dc2626;
            opacity: 0.7;
            background: none;
            border: none;
            font-size: 16px;
        }

        /* رابط إنشاء متجر */
        .signup-link {
            margin-top: 24px;
            text-align: center;
            font-size: 15px;
            color: #64748b;
        }
        .signup-link a {
            color: #3b82f6;
            font-weight: 700;
            text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }

        /* شريط تحميل رفيع */
        #loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: #3b82f6;
            width: 0%;
            z-index: 9999;
            transition: width 0.3s ease;
        }

        /* تجاوب مع الجوال */
        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; border-radius: 28px; }
            .logo-area img { width: 56px; height: 56px; }
            .logo-area h1 { font-size: 24px; }
            .input-group input { padding: 12px 42px 12px 14px; font-size: 15px; }
            .login-btn { padding: 12px; font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div id="loading-bar"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
                <h1>حسابي</h1>
                <p class="subtitle">نظام إدارة الأعمال الذكي</p>
            </div>
            
            <div class="input-group">
                <span class="icon"><i class="fas fa-envelope"></i></span>
                <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
            </div>
            <div class="input-group">
                <span class="icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
            </div>
            
            <div class="error-box" id="errorBox">
                <i class="fas fa-times-circle"></i>
                <span id="errorText"></span>
                <button class="error-close" onclick="hideError()">&times;</button>
            </div>

            <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
            
            <div class="signup-link">
                ليس لديك متجر؟ <a href="./signup.html">أنشئ متجرك الآن</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (function() {
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const loadingBar = document.getElementById('loading-bar');

            window.showLoading = () => { loadingBar.style.width = '80%'; };
            window.hideLoading = () => { loadingBar.style.width = '100%'; setTimeout(() => loadingBar.style.width = '0%', 200); };
            window.showError = (msg) => {
                errorText.textContent = msg;
                errorBox.classList.add('show');
            };
            window.hideError = () => {
                errorBox.classList.remove('show');
            };

            if (!window.App) {
                showError('تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                loginBtn.disabled = true;
                return;
            }

            // تحقق من الجلسة السابقة بصمت
            App.getCurrentUser().then(user => {
                if (user) {
                    let target = './dashboard.html';
                    if (user.role === 'rep') target = './pos.html';
                    else if (user.role === 'super_admin') target = './admin.html';
                    window.location.href = target;
                }
            }).catch(() => {});

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                hideError();
                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';
                showLoading();

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'تسجيل الدخول';
                    hideLoading();
                }
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passInput.focus(); });

            // إخفاء الخطأ عند بدء الكتابة
            emailInput.addEventListener('input', hideError);
            passInput.addEventListener('input', hideError);

            emailInput.focus();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }
        })();
    </script>
</body>
</html>
