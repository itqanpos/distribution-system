<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: white; border-radius:20px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
            padding:40px 30px; width:100%; max-width:420px; text-align:center;
        }
        .logo { margin-bottom:25px; }
        .logo img { width:70px; height:70px; object-fit:contain; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { font-size:24px; font-weight:800; color:#1e293b; margin-bottom:10px; }
        .subtitle { color:#64748b; font-size:14px; margin-bottom:30px; }
        .input-group { margin-bottom:18px; text-align:right; position:relative; }
        .input-group i { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#94a3b8; }
        .input-group input { width:100%; padding:14px 45px 14px 14px; border:1px solid #e2e8f0; border-radius:12px;
                            font-family:'Cairo',sans-serif; font-size:16px; transition:0.2s; }
        .input-group input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .btn { background:#3b82f6; color:white; border:none; border-radius:12px; padding:14px; width:100%;
               font-family:'Cairo',sans-serif; font-weight:700; font-size:18px; cursor:pointer; transition:0.2s; margin-top:10px; }
        .btn:hover { background:#2563eb; }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .signup-link { margin-top:20px; font-size:14px; color:#64748b; }
        .signup-link a { color:#3b82f6; font-weight:600; text-decoration:none; }
        .error-message { color:#ef4444; font-size:14px; margin-top:10px; display:none; }
        /* شريط تحميل صغير أعلى الصفحة */
        #loading-bar {
            position: fixed; top:0; left:0; height:3px; background:#3b82f6;
            width:0%; z-index:9999; transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- شريط تحميل صغير غير معطل -->
    <div id="loading-bar"></div>

    <div class="login-card" id="loginCard">
        <div class="logo">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <i class="fas fa-store" style="font-size:40px;color:#3b82f6;display:none;"></i>
        </div>
        <h2>تسجيل الدخول</h2>
        <p class="subtitle">أدخل بيانات حسابك للوصول إلى النظام</p>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="loginBtn">دخول</button>
        <div class="signup-link">
            ليس لديك حساب؟ <a href="./signup.html" rel="noopener">إنشاء حساب جديد</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (function() {
            const loadingBar = document.getElementById('loading-bar');
            
            function showLoading() { loadingBar.style.width = '80%'; }
            function hideLoading() { loadingBar.style.width = '100%'; setTimeout(() => loadingBar.style.width = '0%', 200); }

            async function checkSession() {
                if (!window.App) {
                    console.warn('App غير محمل');
                    return false;
                }
                try {
                    showLoading();
                    const user = await App.getCurrentUser();
                    if (user) {
                        let target = './dashboard.html';
                        if (user.role === 'rep') target = './pos.html';
                        else if (user.role === 'super_admin') target = './admin.html';
                        window.location.href = target;
                        return true;
                    }
                } catch (e) {
                    console.error('فشل التحقق من الجلسة:', e);
                } finally {
                    hideLoading();
                }
                return false;
            }

            // التحقق من الجلسة بهدوء دون حجب الواجهة
            checkSession();

            // أحداث تسجيل الدخول
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';
                errorMsg.style.display = 'none';
                showLoading();

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                    hideLoading();
                }
            }

            function showError(msg) {
                errorMsg.textContent = '';
                errorMsg.appendChild(document.createTextNode(msg));
                errorMsg.style.display = 'block';
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passInput.focus(); });

            emailInput.focus();

            // تسجيل Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }
        })();
    </script>
</body>
</html>
