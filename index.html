html <!DOCTYPE html> <html lang="ar" dir="rtl"> <head>     <meta charset="UTF-8" />     <meta name="viewport"           content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />      <meta name="theme-color" content="#3b82f6" />     <meta name="description" content="تسجيل الدخول إلى نظام حسابي" />      <title>تسجيل الدخول · حسابي</title>      <!-- Fonts -->     <link rel="preconnect" href="https://fonts.googleapis.com" />     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />      <link         href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap"         rel="stylesheet"     />      <!-- Icons -->     <link         rel="stylesheet"         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"     />      <style>         *{             margin:0;             padding:0;             box-sizing:border-box;         }          body{             font-family:'Cairo',sans-serif;             background:#f0f4f8;             min-height:100vh;             display:flex;             align-items:center;             justify-content:center;             padding:20px;             overflow-x:hidden;         }          /* =========================            Loader         ========================= */          #app-loader{             position:fixed;             inset:0;             background:#f0f4f8;             display:flex;             flex-direction:column;             align-items:center;             justify-content:center;             z-index:9999;             transition:opacity .35s ease, visibility .35s ease;         }          body.loaded #app-loader{             opacity:0;             visibility:hidden;             pointer-events:none;         }          .loader-logo{             width:80px;             height:80px;             margin-bottom:20px;             animation:pulse 1.5s infinite;         }          .loader-logo img{             width:100%;             height:100%;             object-fit:contain;             border-radius:20px;         }          .loader-logo .fallback-icon{             display:none;             font-size:42px;             color:#3b82f6;         }          .loader-logo img.error{             display:none;         }          .loader-logo img.error ~ .fallback-icon{             display:inline-block;         }          .spinner{             width:42px;             height:42px;             border:4px solid #dbeafe;             border-top-color:#3b82f6;             border-radius:50%;             animation:spin .7s linear infinite;             margin-bottom:14px;         }          .loader-text{             color:#64748b;             font-size:15px;             font-weight:600;         }          /* =========================            Login Card         ========================= */          .login-card{             width:100%;             max-width:420px;             background:#fff;             border-radius:24px;             padding:35px 28px;             box-shadow:                 0 25px 50px -12px rgba(0,0,0,.15);             text-align:center;              opacity:0;             transform:translateY(20px);             transition:all .4s ease;         }          body.loaded .login-card{             opacity:1;             transform:translateY(0);         }          .logo{             margin-bottom:24px;         }          .logo img{             width:72px;             height:72px;             object-fit:contain;             border-radius:20px;             box-shadow:0 10px 20px rgba(0,0,0,.1);         }          .logo .fallback-icon{             display:none;             font-size:42px;             color:#3b82f6;         }          .logo img.error{             display:none;         }          .logo img.error ~ .fallback-icon{             display:inline-block;         }          h2{             font-size:26px;             font-weight:800;             color:#0f172a;             margin-bottom:10px;         }          .subtitle{             color:#64748b;             font-size:14px;             margin-bottom:30px;         }          /* =========================            Inputs         ========================= */          .input-group{             position:relative;             margin-bottom:18px;         }          .input-group input{             width:100%;             height:56px;             border:1px solid #dbe2ea;             border-radius:14px;             background:#f8fafc;              padding:                 0 46px                 0 46px;              font-family:'Cairo',sans-serif;             font-size:15px;              transition:.2s;         }          .input-group input:focus{             outline:none;             background:#fff;             border-color:#3b82f6;             box-shadow:0 0 0 4px rgba(59,130,246,.12);         }          .input-icon{             position:absolute;             right:16px;             top:50%;             transform:translateY(-50%);             color:#94a3b8;             transition:.2s;             pointer-events:none;         }          .input-group input:focus ~ .input-icon{             color:#3b82f6;         }          /* =========================            Toggle Password         ========================= */          .toggle-password{             position:absolute;             left:12px;             top:50%;             transform:translateY(-50%);              border:none;             background:none;              width:36px;             height:36px;              border-radius:10px;             cursor:pointer;              color:#94a3b8;             transition:.2s;         }          .toggle-password:hover{             background:#eff6ff;             color:#3b82f6;         }          /* =========================            Button         ========================= */          .btn{             width:100%;             height:56px;              border:none;             border-radius:14px;              background:#3b82f6;             color:#fff;              font-family:'Cairo',sans-serif;             font-size:17px;             font-weight:700;              cursor:pointer;             transition:.2s;              margin-top:8px;         }          .btn:hover{             background:#2563eb;         }          .btn:disabled{             opacity:.7;             cursor:not-allowed;         }          .btn-content{             display:flex;             align-items:center;             justify-content:center;             gap:10px;         }          .btn-spinner{             width:18px;             height:18px;             border:2px solid rgba(255,255,255,.3);             border-top-color:#fff;             border-radius:50%;             animation:spin .7s linear infinite;             display:none;         }          .btn.loading .btn-spinner{             display:block;         }          .btn.loading .btn-text{             opacity:.8;         }          /* =========================            Error         ========================= */          .error-message{             display:none;             margin-top:10px;             padding:12px;             border-radius:12px;             background:#fef2f2;             color:#dc2626;             font-size:14px;             font-weight:600;             text-align:center;         }          /* =========================            Signup Link         ========================= */          .signup-link{             margin-top:22px;             color:#64748b;             font-size:14px;         }          .signup-link a{             color:#2563eb;             text-decoration:none;             font-weight:700;         }          .signup-link a:hover{             color:#1d4ed8;         }          /* =========================            Animations         ========================= */          @keyframes spin{             to{                 transform:rotate(360deg);             }         }          @keyframes pulse{             0%{                 transform:scale(1);             }              50%{                 transform:scale(1.05);             }              100%{                 transform:scale(1);             }         }          /* =========================            Mobile         ========================= */          @media(max-width:480px){              body{                 padding:16px;             }              .login-card{                 padding:30px 20px;             }              h2{                 font-size:22px;             }         }     </style> </head>  <body>      <!-- Loader -->     <div id="app-loader">          <div class="loader-logo">              <img                 src="./icons/icon-192x192.png"                 alt="حسابي"                  onerror="                     this.classList.add('error');                 "             />              <i class="fas fa-store fallback-icon"></i>          </div>          <div class="spinner"></div>          <div class="loader-text">             جاري التحميل...         </div>      </div>      <!-- Login Card -->     <div class="login-card">          <div class="logo">              <img                 src="./icons/icon-192x192.png"                 alt="حسابي"                  onerror="                     this.classList.add('error');                 "             />              <i class="fas fa-store fallback-icon"></i>          </div>          <h2>             تسجيل الدخول         </h2>          <p class="subtitle">             أدخل بيانات حسابك للوصول إلى النظام         </p>          <form id="loginForm" novalidate>              <!-- Email -->             <div class="input-group">                  <input                     type="email"                     id="email"                     placeholder="البريد الإلكتروني"                     autocomplete="email"                     required                 />                  <i class="fas fa-envelope input-icon"></i>              </div>              <!-- Password -->             <div class="input-group">                  <input                     type="password"                     id="password"                     placeholder="كلمة المرور"                     autocomplete="current-password"                     required                 />                  <button                     type="button"                     class="toggle-password"                     id="togglePassword"                     aria-label="إظهار كلمة المرور"                 >                     <i class="fas fa-eye"></i>                 </button>                  <i class="fas fa-lock input-icon"></i>              </div>              <!-- Error -->             <div class="error-message" id="errorMsg"></div>              <!-- Submit -->             <button type="submit" class="btn" id="loginBtn">                  <div class="btn-content">                      <span class="btn-text">                         دخول                     </span>                      <span class="btn-spinner"></span>                  </div>              </button>          </form>          <div class="signup-link">             ليس لديك حساب؟             <a href="./signup.html">                 إنشاء حساب جديد             </a>         </div>      </div>      <!-- Scripts -->     <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>      <script defer src="./js/supabase.js"></script>     <script defer src="./js/db-local.js"></script>     <script defer src="./js/sync.js"></script>      <!-- App -->     <script>         (() => {              const $ = (selector) =>                 document.querySelector(selector);              const emailInput =                 $('#email');              const passwordInput =                 $('#password');              const loginForm =                 $('#loginForm');              const loginBtn =                 $('#loginBtn');              const errorMsg =                 $('#errorMsg');              const togglePasswordBtn =                 $('#togglePassword');              let isRedirecting = false;              /* =========================                Helpers             ========================= */              function showError(message){                  errorMsg.textContent = message;                 errorMsg.style.display = 'block';              }              function hideError(){                  errorMsg.style.display = 'none';                 errorMsg.textContent = '';              }              function setLoading(state){                  loginBtn.disabled = state;                  if(state){                      loginBtn.classList.add('loading');                  }else{                      loginBtn.classList.remove('loading');                  }             }              /* =========================                Redirect             ========================= */              function redirectUser(role){                  if(isRedirecting) return;                  isRedirecting = true;                  let target = './dashboard.html';                  if(role === 'rep'){                      target = './pos.html';                  }else if(role === 'super_admin'){                      target = './admin.html';                  }                  window.location.href = target;              }              /* =========================                Toggle Password             ========================= */              togglePasswordBtn.addEventListener(                 'click',                 () => {                      const isPassword =                         passwordInput.type === 'password';                      passwordInput.type =                         isPassword                             ? 'text'                             : 'password';                      const icon =                         togglePasswordBtn.querySelector('i');                      icon.classList.toggle(                         'fa-eye',                         !isPassword                     );                      icon.classList.toggle(                         'fa-eye-slash',                         isPassword                     );                      togglePasswordBtn.setAttribute(                         'aria-label',                         isPassword                             ? 'إخفاء كلمة المرور'                             : 'إظهار كلمة المرور'                     );                  }             );              /* =========================                Login             ========================= */              async function performLogin(event){                  event.preventDefault();                  hideError();                  const email =                     emailInput.value.trim();                  const password =                     passwordInput.value;                  if(!email){                      showError(                         'يرجى إدخال البريد الإلكتروني'                     );                      emailInput.focus();                      return;                 }                  if(!password){                      showError(                         'يرجى إدخال كلمة المرور'                     );                      passwordInput.focus();                      return;                 }                  const emailRegex =                     /^[^\s@]+@[^\s@]+\.[^\s@]+$/;                  if(!emailRegex.test(email)){                      showError(                         'صيغة البريد الإلكتروني غير صحيحة'                     );                      emailInput.focus();                      return;                 }                  if(                     !window.App ||                     typeof window.App.login !== 'function'                 ){                      showError(                         'فشل تحميل التطبيق'                     );                      return;                 }                  try{                      setLoading(true);                      const result =                         await window.App.login(                             email,                             password                         );                      if(result?.success){                          redirectUser(                             result.user?.role                         );                      }else{                          showError(                             result?.message ||                             'فشل تسجيل الدخول'                         );                      }                  }catch(error){                      console.error(error);                      showError(                         'حدث خطأ غير متوقع'                     );                  }finally{                      setLoading(false);                  }              }              /* =========================                Session Check             ========================= */              async function checkSession(){                  try{                      const sessionStr =                         localStorage.getItem(                             'app_session'                         );                      if(!sessionStr) return;                      const session =                         JSON.parse(sessionStr);                      if(                         session?.id &&                         session?.role &&                         session?.tenant_id != null                     ){                          redirectUser(                             session.role                         );                      }                  }catch(error){                      console.warn(                         'خطأ في الجلسة:',                         error                     );                      localStorage.removeItem(                         'app_session'                     );                  }              }              /* =========================                Init             ========================= */              async function init(){                  try{                      await new Promise(resolve =>                         setTimeout(resolve, 300)                     );                      // Hide Loader                     document.body.classList.add(                         'loaded'                     );                      // Check Session                     await checkSession();                      // Focus                     emailInput.focus();                      // Events                     loginForm.addEventListener(                         'submit',                         performLogin                     );                      [emailInput, passwordInput]                         .forEach(input => {                              input.addEventListener(                                 'input',                                 hideError                             );                          });                      emailInput.addEventListener(                         'keydown',                         e => {                              if(e.key === 'Enter'){                                  e.preventDefault();                                  passwordInput.focus();                              }                          }                     );                      // Service Worker                     if(                         'serviceWorker' in navigator &&                         location.protocol.includes('http')                     ){                          navigator.serviceWorker                             .register('./sw.js')                             .catch(error => {                                  console.warn(                                     'SW Error:',                                     error                                 );                              });                      }                  }catch(error){                      console.error(error);                      showError(                         'حدث خطأ أثناء تشغيل الصفحة'                     );                      document.body.classList.add(                         'loaded'                     );                  }              }              /* =========================                Start             ========================= */              if(                 document.readyState === 'loading'             ){                  document.addEventListener(                     'DOMContentLoaded',                     init                 );              }else{                  init();              }          })();     </script>  </body> </html>
