<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="تسجيل الدخول إلى نظام حسابي">
    <title>تسجيل الدخول · حسابي</title>

    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f8fafc">

    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --radius: 20px;
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #e9eef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* الشعار */
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: #eef2ff;
            color: #2563eb;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* رسالة الخطأ */
        .alert {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }
        .alert.show { display: flex; }
        .alert a {
            color: #b91c1c;
            font-weight: 700;
            margin-right: auto;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }
        .alert a:hover { text-decoration: underline; }

        /* الحقول */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 44px 14px 44px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            color: var(--text);
            transition: all 0.2s;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .input-group input::placeholder { color: #94a3b8; }
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            pointer-events: none;
            transition: color 0.2s;
        }
        .input-group input:focus ~ .input-icon,
        .input-group input:not(:placeholder-shown) ~ .input-icon {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-password:hover { color: var(--primary); }

        /* زر الدخول */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 15px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 8px 20px -10px rgba(37,99,235,0.4);
        }
        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 12px 24px -10px rgba(37,99,235,0.5);
            transform: translateY(-1px);
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: inline-block; }

        /* رابط التسجيل */
        .signup-link {
            margin-top: 26px;
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
        }
        .signup-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 32px 22px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <!-- الشعار -->
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-store-alt"></i></div>
                <h1>حسابي</h1>
                <p>نظام إدارة الأعمال</p>
            </div>

            <!-- رسالة خطأ -->
            <div class="alert" id="connectionAlert">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="alertMsg"></span>
                <a onclick="location.reload()">إعادة المحاولة</a>
            </div>

            <!-- نموذج الدخول -->
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" inputmode="email">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <button type="button" class="toggle-password" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <button class="btn" id="loginBtn">
                <span class="btn-text">تسجيل الدخول</span>
                <span class="spinner"></span>
            </button>

            <div class="signup-link">
                ليس لديك متجر؟ <a href="./signup.html">أنشئ متجرك</a>
            </div>
        </div>
    </div>

    <!-- الاعتماديات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-core.js"></script>
    <script src="./js/supabase-auth.js"></script>
    <script src="./js/toast.js"></script>

    <script>
        (() => {
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('connectionAlert');
            const alertMsg = document.getElementById('alertMsg');
            const togglePasswordBtn = document.getElementById('togglePassword');

            function showAlert(message, showRetry = true) {
                alertMsg.textContent = message;
                alertBox.classList.add('show');
                const retryLink = alertBox.querySelector('a');
                if (retryLink) retryLink.style.display = showRetry ? '' : 'none';
            }
            function hideAlert() {
                alertBox.classList.remove('show');
            }

            function showToast(msg, type = 'error') {
                if (window.Toast?.show) {
                    Toast.show(msg, type);
                } else if (window.Toast) {
                    const method = type === 'warning' ? 'warn' : type;
                    if (typeof Toast[method] === 'function') Toast[method](msg);
                    else alert(msg);
                } else {
                    alert(msg);
                }
            }

            function waitForApp(timeoutMs = 8000) {
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    const check = () => {
                        if (window.App && typeof App.login === 'function' && typeof App.getCurrentUser === 'function') {
                            resolve();
                        } else if (Date.now() - start > timeoutMs) {
                            reject(new Error('انتهت مهلة الاتصال'));
                        } else {
                            setTimeout(check, 200);
                        }
                    };
                    check();
                });
            }

            async function init() {
                loginBtn.disabled = true;
                const btnText = loginBtn.querySelector('.btn-text');
                btnText.textContent = 'جاري الاتصال...';

                try {
                    await waitForApp();
                    hideAlert();

                    const user = await App.getCurrentUser();
                    if (user) {
                        let target = './dashboard.html';
                        if (user.role === 'rep') target = './pos.html';
                        else if (user.role === 'super_admin') target = './admin.html';
                        if (window.location.pathname.indexOf('index.html') !== -1 || window.location.pathname.endsWith('/')) {
                            window.location.href = target;
                        }
                        return;
                    }

                    loginBtn.disabled = false;
                    btnText.textContent = 'تسجيل الدخول';
                } catch (err) {
                    showAlert('تعذر الاتصال بالخادم. تأكد من اتصالك بالإنترنت.');
                    btnText.textContent = 'تعذر الاتصال';
                }
            }

            togglePasswordBtn.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                const icon = togglePasswordBtn.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showToast('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'warning');
                    return;
                }

                if (!window.App || typeof App.login !== 'function') {
                    showAlert('الاتصال غير متاح حاليًا، جارٍ إعادة المحاولة...');
                    try {
                        await waitForApp(4000);
                        hideAlert();
                    } catch (e) {
                        showAlert('فشل الاتصال. الرجاء التحقق من الإنترنت والمحاولة لاحقًا.');
                        return;
                    }
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showToast(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showToast(e.message || 'حدث خطأ غير متوقع');
                } finally {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', e => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', e => { if (e.key === 'Enter') passInput.focus(); });

            emailInput.focus();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }

            window.addEventListener('online', () => {
                hideAlert();
                const btnText = loginBtn.querySelector('.btn-text');
                if (loginBtn.disabled && btnText && btnText.textContent === 'تعذر الاتصال') {
                    init();
                }
            });
            window.addEventListener('offline', () => {
                showAlert('أنت غير متصل بالإنترنت', false);
            });

            init();
        })();
    </script>
</body>
</html>
