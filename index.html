<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- ... كل شيء كما هو ... -->
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
                <h1>حسابي</h1>
                <p class="subtitle">نظام إدارة الأعمال الذكي</p>
            </div>
            
            <div id="connectionStatus" style="text-align:center; margin-bottom:15px; display:none;">
                <span style="color:#ef4444; font-size:14px;">⚠️ تعذر الاتصال بالخادم. <a href="#" onclick="location.reload()">إعادة المحاولة</a></span>
            </div>

            <div class="input-group">
                <span class="icon"><i class="fas fa-envelope"></i></span>
                <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" inputmode="email" autocorrect="off" autocapitalize="none" />
            </div>
            <div class="input-group">
                <span class="icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
            </div>
            
            <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
            
            <div class="signup-link">
                ليس لديك متجر؟ <a href="./signup.html">أنشئ متجرك الآن</a>
            </div>
        </div>
    </div>

    <!-- الاعتماديات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/core/db-local.js"></script>
    <script src="./js/core/supabase.js"></script>
    <script src="./js/core/sync.js"></script>
    <script src="./js/core/toast.js"></script>

    <script>
        (function() {
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const statusDiv = document.getElementById('connectionStatus');

            function showError(msg) {
                window.Toast?.error(msg) || alert(msg);
            }

            // التحقق من جاهزية النواة مع إعادة المحاولة
            function checkAppReady(callback, retries = 10) {
                if (window.App && window.App.login && window.App.getCurrentUser) {
                    callback();
                    return;
                }
                if (retries <= 0) {
                    statusDiv.style.display = 'block';
                    loginBtn.disabled = true;
                    return;
                }
                setTimeout(() => checkAppReady(callback, retries - 1), 500);
            }

            checkAppReady(() => {
                statusDiv.style.display = 'none';
                loginBtn.disabled = false;

                // إعادة توجيه المستخدم المسجل
                App.getCurrentUser().then(user => {
                    if (user) {
                        let target = './dashboard.html';
                        if (user.role === 'rep') target = './pos.html';
                        else if (user.role === 'super_admin') target = './admin.html';
                        window.location.href = target;
                    }
                }).catch(() => {});
            });

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError(e.message || 'حدث خطأ غير متوقع');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'تسجيل الدخول';
                }
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', e => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', e => { if (e.key === 'Enter') passInput.focus(); });

            emailInput.focus();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            }
        })();
    </script>
</body>
</html>
