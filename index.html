<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>تسجيل الدخول · حسابي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        #app-loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #f0f4f8; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            font-family: 'Cairo', sans-serif; transition: opacity 0.3s ease;
        }
        body.loaded #app-loader { opacity: 0; pointer-events: none; }
        .loader-logo { width:80px; height:80px; margin-bottom:20px; animation: pulse 1.5s infinite; }
        .loader-logo img { width:100%; height:100%; object-fit:contain; border-radius:20px; }
        .spinner { width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:#3b82f6;
                   border-radius:50%; animation: spin 0.8s linear infinite; margin-bottom:15px; }
        .loader-text { color:#64748b; font-size:16px; font-weight:500; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }

        .login-card {
            background: white; border-radius:20px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
            padding:40px 30px; width:100%; max-width:420px; text-align:center; display:none;
        }
        body.loaded .login-card { display: block; }
        .logo { margin-bottom:25px; }
        .logo img { width:70px; height:70px; object-fit:contain; border-radius:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { font-size:24px; font-weight:800; color:#1e293b; margin-bottom:10px; }
        .subtitle { color:#64748b; font-size:14px; margin-bottom:30px; }
        .input-group { margin-bottom:18px; text-align:right; position:relative; }
        .input-group i { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#94a3b8; }
        .input-group input { width:100%; padding:14px 45px 14px 14px; border:1px solid #e2e8f0; border-radius:12px;
                            font-family:'Cairo',sans-serif; font-size:16px; transition:0.2s; }
        .input-group input:focus { outline:none; border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .btn { background:#3b82f6; color:white; border:none; border-radius:12px; padding:14px; width:100%;
               font-family:'Cairo',sans-serif; font-weight:700; font-size:18px; cursor:pointer; transition:0.2s; margin-top:10px; }
        .btn:hover { background:#2563eb; }
        .btn:disabled { opacity:0.6; cursor:not-allowed; }
        .signup-link { margin-top:20px; font-size:14px; color:#64748b; }
        .signup-link a { color:#3b82f6; font-weight:600; text-decoration:none; }
        .error-message { color:#ef4444; font-size:14px; margin-top:10px; display:none; }
    </style>
</head>
<body class="loading">
    <div id="app-loader">
        <div class="loader-logo">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
        </div>
        <div class="spinner"></div>
        <div class="loader-text">جاري التحميل...</div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo">
            <img src="./icons/icon-192x192.png" alt="حسابي" onerror="this.style.display='none';">
            <i class="fas fa-store" style="font-size:40px;color:#3b82f6;display:none;"></i>
        </div>
        <h2>تسجيل الدخول</h2>
        <p class="subtitle">أدخل بيانات حسابك للوصول إلى النظام</p>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" />
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button class="btn" id="loginBtn">دخول</button>
        <div class="signup-link">
            ليس لديك حساب؟ <a href="./signup.html" rel="noopener">إنشاء حساب جديد</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>

    <script>
        (async function() {
            if (!window.App) {
                document.body.classList.remove('loading');
                alert('خطأ في تحميل التطبيق');
                return;
            }

            // حماية من التعليق: أياً كان ما يحدث، نخفي شاشة التحميل بعد 6 ثوان
            const timeout = setTimeout(() => {
                console.warn('⏰ انتهت مهلة التحقق - إظهار نموذج الدخول');
                document.body.classList.remove('loading');
            }, 6000);

            try {
                // تحقق حقيقي من الجلسة
                const user = await App.getCurrentUser();
                clearTimeout(timeout);

                if (user) {
                    let target = './dashboard.html';
                    if (user.role === 'rep') target = './pos.html';
                    else if (user.role === 'super_admin') target = './admin.html';
                    window.location.href = target;
                    return;
                }
            } catch (error) {
                console.error('فشل التحقق من الجلسة:', error);
                clearTimeout(timeout);
                // حتى لو فشل، نكمل ونجهز نموذج الدخول
            }

            // لا توجد جلسة (أو فشل التحقق) -> إظهار نموذج الدخول
            document.body.classList.remove('loading');

            // أحداث تسجيل الدخول
            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            async function performLogin() {
                const email = emailInput.value.trim();
                const password = passInput.value;

                if (!email || !password) {
                    showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'جاري الدخول...';
                errorMsg.style.display = 'none';

                try {
                    const result = await App.login(email, password);
                    if (result.success) {
                        window.location.href = result.redirectUrl || './dashboard.html';
                    } else {
                        showError(result.message || 'فشل تسجيل الدخول');
                    }
                } catch (e) {
                    showError('حدث خطأ غير متوقع');
                    console.error(e);
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                }
            }

            function showError(msg) {
                // آمن ضد XSS باستخدام textContent
                errorMsg.textContent = '';
                errorMsg.appendChild(document.createTextNode(msg));
                errorMsg.style.display = 'block';
            }

            loginBtn.addEventListener('click', performLogin);
            passInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
            emailInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') passInput.focus(); });

            emailInput.focus();

            // تسجيل Service Worker – المسار الصحيح
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js').catch((err) => {
                    console.warn('فشل تسجيل Service Worker:', err);
                });
            }
        })();
    </script>
</body>
</html>
