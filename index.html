<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <base href="/distribution-system/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام التوزيع الغذائي - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="./manifest.json">
    
    <!-- Firebase SDK (Firestore فقط) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #1abc9c;
            --light: #ecf0f1;
            --dark: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--secondary), var(--info));
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 15px;
        }

        .login-header h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
        }

        .input-icon input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-icon input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52,152,219,0.3);
        }

        .demo-section {
            margin-top: 25px;
            text-align: center;
        }

        .demo-label {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .demo-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .demo-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            background: white;
            color: var(--secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .demo-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .demo-btn.admin {
            border-color: var(--primary);
            color: var(--primary);
        }

        .demo-btn.admin:hover {
            background: var(--primary);
            color: white;
        }

        .demo-btn.rep {
            border-color: var(--success);
            color: var(--success);
        }

        .demo-btn.rep:hover {
            background: var(--success);
            color: white;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 13px;
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        #installBtn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 3000;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-truck"></i>
            </div>
            <h2>نظام التوزيع الغذائي</h2>
            <p>الرجاء إدخال بيانات الدخول</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <div class="error-message" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </form>
        
        <div class="demo-section">
            <div class="demo-label">حسابات تجريبية</div>
            <div class="demo-buttons">
                <button type="button" class="demo-btn admin" onclick="fillDemo('admin')">
                    <i class="fas fa-user-tie"></i> مدير
                </button>
                <button type="button" class="demo-btn rep" onclick="fillDemo('rep')">
                    <i class="fas fa-user"></i> مندوب
                </button>
            </div>
        </div>
        
        <div class="login-footer">
            © 2024 نظام إدارة التوزيع الغذائي
        </div>
    </div>

    <button id="installBtn"><i class="fas fa-download"></i> تثبيت التطبيق</button>

    <!-- ملفات التطبيق -->
    <script src="./js/firebase-config.js"></script>
    <script src="./js/storage-firebase.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/auth-local.js"></script>
    
    <script>
        // التحقق مما إذا كان المستخدم مسجلاً مسبقاً وتوجيهه
        (function() {
            if (Auth.isAuthenticated && Auth.isAuthenticated()) {
                const user = Auth.getUser();
                if (user) {
                    window.location.href = Auth.getRedirectUrl(user.role);
                }
            }
        })();

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            
            if (!username || !password) {
                errorEl.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
                errorEl.style.display = 'block';
                return;
            }
            
            const result = await Auth.login(username, password);
            
            if (result.success) {
                window.location.href = result.redirectUrl;
            } else {
                errorEl.textContent = result.message || 'فشل تسجيل الدخول';
                errorEl.style.display = 'block';
            }
        }

        function fillDemo(role) {
            if (role === 'admin') {
                document.getElementById('username').value = 'admin';
                document.getElementById('password').value = '123456';
            } else {
                document.getElementById('username').value = 'مندوب1';
                document.getElementById('password').value = '123456';
            }
            document.getElementById('loginError').style.display = 'none';
        }

        // إخفاء رسالة الخطأ عند الكتابة
        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
        
        function hideError() {
            document.getElementById('loginError').style.display = 'none';
        }

        // PWA Install Prompt
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                console.log('تم تثبيت التطبيق');
                installBtn.style.display = 'none';
            }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    </script>
</body>
</html>
