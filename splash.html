<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>حسابي · جاري التحميل</title>
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #bfdbfe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            overscroll-behavior: none;
        }
        
        .splash-container {
            text-align: center;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
        }
        
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .app-icon-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* الخلفية المتوهجة تبقى موجودة */
        .app-icon-bg {
            position: absolute;
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(59, 130, 246, 0.35);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 25px 60px rgba(59, 130, 246, 0.35); }
            50% { box-shadow: 0 25px 80px rgba(59, 130, 246, 0.55); }
        }
        
        /* أيقونة التطبيق - الآن بصيغة img */
        .app-icon {
            position: relative;
            z-index: 1;
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 20px; /* اختياري */
        }
        
        .app-title {
            font-size: 40px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .app-version {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            border-radius: 2px;
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }
        
        .pull-hint {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 13px;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 0.7; }
        }
        
        .pull-hint i {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        /* مؤشر السحب للتحديث */
        .pull-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .pull-indicator.visible {
            opacity: 1;
        }
        
        .pull-indicator i {
            color: #3b82f6;
            font-size: 18px;
        }
        
        .status-message {
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- مؤشر السحب للتحديث -->
    <div class="pull-indicator" id="pullIndicator">
        <i class="fas fa-sync-alt"></i>
        <span>اسحب للتحديث</span>
    </div>
    
    <div class="splash-container">
        <div class="app-icon-wrapper">
            <div class="app-icon-bg"></div>
            <!-- 
                 هنا يتم عرض الأيقونة من ملف الصورة.
                 تأكد من وجود ملف icon-192x192.png داخل مجلد icons.
                 يمكنك تغيير المسار إذا كانت الأيقونة باسم آخر.
            -->
            <img src="./icons/icon-192x192.png" alt="حسابي" class="app-icon"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <!-- أيقونة احتياطية في حالة عدم وجود الصورة -->
            <i class="fas fa-store app-icon" style="display:none; font-size:65px; color:white;"></i>
        </div>
        
        <h1 class="app-title">حسابي</h1>
        <p class="app-version">نظام إدارة المبيعات والتوزيع</p>
        
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        
        <p class="status-message" id="statusMessage">جاري الاتصال بقاعدة البيانات...</p>
        
        <div class="pull-hint">
            <i class="fas fa-arrow-down"></i> اسحب للأسفل للتحديث
        </div>
    </div>
    
    <script>
        // ====================== تسجيل Service Worker ======================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker مسجل بنجاح', reg.scope))
                    .catch(err => console.warn('فشل تسجيل Service Worker', err));
            });
        }
        
        // ====================== سحب للتحديث ======================
        let pullStartY = 0;
        let pulling = false;
        const pullThreshold = 100;
        const pullIndicator = document.getElementById('pullIndicator');
        
        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                pullStartY = e.touches[0].clientY;
                pulling = true;
            }
        }, { passive: false });
        
        document.addEventListener('touchmove', (e) => {
            if (!pulling) return;
            const currentY = e.touches[0].clientY;
            const pullDistance = currentY - pullStartY;
            
            if (pullDistance > 30) {
                pullIndicator.classList.add('visible');
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('touchend', async (e) => {
            if (!pulling) return;
            pulling = false;
            pullIndicator.classList.remove('visible');
            
            const currentY = e.changedTouches[0].clientY;
            const pullDistance = currentY - pullStartY;
            
            if (pullDistance > pullThreshold) {
                await refreshApp();
            }
        });
        
        async function refreshApp() {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = 'جاري التحديث...';
            
            try {
                if (window.App && App.getCurrentUser()) {
                    const user = App.getCurrentUser();
                    window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
                    return;
                }
                
                if (window.DB) {
                    await DB.getSettings().catch(() => {});
                    statusEl.textContent = 'تم الاتصال بنجاح';
                } else {
                    statusEl.textContent = 'قاعدة البيانات غير متصلة';
                }
            } catch (err) {
                statusEl.textContent = 'فشل الاتصال: ' + err.message;
            }
            
            setTimeout(() => {
                if (window.App && App.getCurrentUser()) {
                    const user = App.getCurrentUser();
                    window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
                } else {
                    window.location.href = './index.html';
                }
            }, 3000);
        }
        
        // ====================== تحميل تلقائي ======================
        window.addEventListener('load', async () => {
            if (window.App && App.getCurrentUser()) {
                const user = App.getCurrentUser();
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
                }, 2000);
            } else {
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 2500);
            }
        });
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
</body>
</html>
