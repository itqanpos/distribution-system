<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>حسابي · جاري التحميل</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="./js/db-local.js"></script>
    <script src="./js/sync.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
    
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --gray-600: #475569;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #bfdbfe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }
        
        .splash-container {
            text-align: center;
            padding: 20px;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .app-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app-icon-bg {
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-light), #06b6d4);
            border-radius: 30px;
            box-shadow: 0 24px 48px rgba(59, 130, 246, 0.35);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 24px 48px rgba(59, 130, 246, 0.35); }
            50% { box-shadow: 0 24px 64px rgba(59, 130, 246, 0.55); }
        }
        
        .app-icon-img {
            position: relative;
            z-index: 1;
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 16px;
        }
        
        .app-icon-fallback {
            position: relative;
            z-index: 1;
            font-size: 52px;
            color: white;
        }
        
        .app-title {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .app-version {
            color: var(--gray-600);
            font-size: 15px;
            margin-bottom: 32px;
        }
        
        .loading-bar-container {
            width: 180px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin: 0 auto 24px;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), #06b6d4);
            border-radius: 2px;
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }
        
        .status-message {
            color: var(--gray-600);
            font-size: 14px;
            min-height: 20px;
        }
        
        .pull-hint {
            margin-top: 48px;
            color: #94a3b8;
            font-size: 12px;
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        @keyframes fadeIn {
            to { opacity: 0.6; }
        }
        
        .pull-hint i {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .offline-note {
            display: none;
            background: #fef3c7;
            color: #92400e;
            padding: 10px 16px;
            border-radius: 12px;
            margin-top: 20px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .offline-note.show {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="app-icon-wrapper">
            <div class="app-icon-bg"></div>
            <img src="./icons/icon-192x192.png" alt="حسابي" class="app-icon-img"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <i class="fas fa-store app-icon-fallback" style="display:none;"></i>
        </div>
        
        <h1 class="app-title">حسابي</h1>
        <p class="app-version">نظام إدارة المبيعات والتوزيع</p>
        
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        
        <p class="status-message" id="statusMessage">جاري تجهيز البيانات...</p>
        <div id="offlineNote" class="offline-note">📡 أنت غير متصل - سيتم استخدام البيانات المحلية</div>
        
        <div class="pull-hint">
            <i class="fas fa-arrow-down"></i> اسحب للأسفل للتحديث
        </div>
    </div>
    
    <script>
        'use strict';
        
        const statusEl = document.getElementById('statusMessage');
        const offlineNote = document.getElementById('offlineNote');
        
        // إظهار / تحديث الرسالة
        function setStatus(msg) {
            statusEl.textContent = msg;
        }
        
        // التحقق من الاتصال
        if (!navigator.onLine) {
            offlineNote.classList.add('show');
            setStatus('وضع غير متصل - جاري تحميل البيانات المحلية...');
        }
        
        // انتظار تجهيز localDB ثم التوجيه
        async function bootApp() {
            // انتظار localDB إذا كانت موجودة
            if (window.localDB && typeof window.localDB.initPromise !== 'undefined') {
                setStatus('جاري تجهيز التخزين المحلي...');
                try {
                    await window.localDB.initPromise;
                } catch (e) {
                    console.warn('تجاوز خطأ localDB:', e);
                }
            }
            
            // تحقق من وجود جلسة سابقة
            if (window.App && App.getCurrentUser()) {
                setStatus('جاري تحميل حسابك...');
                const user = App.getCurrentUser();
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? './dashboard.html' : './pos.html';
                }, 800);
            } else {
                setStatus('جاري التوجيه لتسجيل الدخول...');
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 800);
            }
        }
        
        // بدء التطبيق
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(bootApp, 500);
        });
        
        // سحب للتحديث
        let pullStartY = 0, pulling = false;
        const pullThreshold = 100;
        
        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                pullStartY = e.touches[0].clientY;
                pulling = true;
            }
        }, { passive: false });
        
        document.addEventListener('touchmove', (e) => {
            if (!pulling) return;
            if (e.touches[0].clientY - pullStartY > 50) {
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('touchend', (e) => {
            if (!pulling) return;
            pulling = false;
            if (e.changedTouches[0].clientY - pullStartY > pullThreshold) {
                setStatus('جاري التحديث...');
                setTimeout(() => window.location.reload(), 300);
            }
        });
        
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(() => {});
        }
        
        // حدث التثبيت PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
    </script>
</body>
</html>
