<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>حسابي · جاري التحميل</title>
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حسابي">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #a7f3d0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            overscroll-behavior: none;
        }
        
        .splash-container {
            text-align: center;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
        }
        
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .app-icon-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .app-icon-bg {
            position: absolute;
            width: 160px;
            height: 160px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.25);
        }
        
        .app-icon {
            position: relative;
            z-index: 1;
            width: 110px;
            height: 110px;
            object-fit: contain;
        }
        
        .app-title {
            font-size: 40px;
            font-weight: 700;
            color: #065f46;
            margin-bottom: 10px;
        }
        
        .app-version {
            color: #047857;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: #d1fae5;
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 2px;
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }
        
        .pull-hint {
            margin-top: 40px;
            color: #065f46;
            font-size: 13px;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 0.7; }
        }
        
        .pull-hint i {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .pull-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .pull-indicator.visible {
            opacity: 1;
        }
        
        .pull-indicator i {
            color: #10b981;
            font-size: 18px;
        }
        
        .status-message {
            margin-top: 20px;
            color: #047857;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="pull-indicator" id="pullIndicator">
        <i class="fas fa-sync-alt"></i>
        <span>اسحب للتحديث</span>
    </div>
    
    <div class="splash-container">
        <div class="app-icon-wrapper">
            <div class="app-icon-bg"></div>
            
            <!-- 🔥 اللوجو الجديد -->
            <img src="logo.png" class="app-icon" alt="حسابي">
        </div>
        
        <h1 class="app-title">حسابي</h1>
        <p class="app-version">نظام إدارة المبيعات والتوزيع</p>
        
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        
        <p class="status-message" id="statusMessage">جاري الاتصال بقاعدة البيانات...</p>
        
        <div class="pull-hint">
            <i class="fas fa-arrow-down"></i> اسحب للأسفل للتحديث
        </div>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
        
        let pullStartY = 0;
        let pulling = false;
        const pullThreshold = 100;
        const pullIndicator = document.getElementById('pullIndicator');
        
        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                pullStartY = e.touches[0].clientY;
                pulling = true;
            }
        }, { passive: false });
        
        document.addEventListener('touchmove', (e) => {
            if (!pulling) return;
            const currentY = e.touches[0].clientY;
            const pullDistance = currentY - pullStartY;
            
            if (pullDistance > 30) {
                pullIndicator.classList.add('visible');
                e.preventDefault();
            }
        }, { passive: false });
        
        document.addEventListener('touchend', async (e) => {
            if (!pulling) return;
            pulling = false;
            pullIndicator.classList.remove('visible');
            
            const currentY = e.changedTouches[0].clientY;
            const pullDistance = currentY - pullStartY;
            
            if (pullDistance > pullThreshold) {
                await refreshApp();
            }
        });
        
        async function refreshApp() {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = 'جاري التحديث...';
            
            setTimeout(() => {
                window.location.href = './index.html';
            }, 3000);
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                window.location.href = './index.html';
            }, 2500);
        });
    </script>
</body>
</html>
