<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>اختبار اتصال Supabase</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .section {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .section h3 {
            margin: 0 0 10px 0;
            color: #34495e;
            font-size: 18px;
        }
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
            background: white;
            border-left: 4px solid #ccc;
        }
        .status.success { background: #e8f5e9; border-left-color: #4caf50; color: #2e7d32; }
        .status.error { background: #ffebee; border-left-color: #f44336; color: #c62828; }
        .status.pending { background: #fff8e1; border-left-color: #ff9800; color: #e65100; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            background: #3498db;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-success { background: #2ecc71; }
        .btn-outline { background: white; color: #3498db; border: 2px solid #3498db; }
        .note {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 10px;
            text-align: center;
        }
        .divider { margin: 20px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔌 اختبار اتصال Supabase</h2>

    <!-- 1. التهيئة -->
    <div class="section">
        <h3>1️⃣ حالة التهيئة</h3>
        <div id="initStatus" class="status pending">⏳ جاري التحقق...</div>
    </div>

    <!-- 2. الجداول -->
    <div class="section">
        <h3>2️⃣ الجداول المطلوبة</h3>
        <div id="tablesStatus"></div>
    </div>

    <!-- 3. كتابة -->
    <div class="section">
        <h3>3️⃣ اختبار الكتابة</h3>
        <button class="btn" onclick="testWrite()">✏️ حفظ منتج تجريبي</button>
        <div id="writeStatus"></div>
    </div>

    <!-- 4. قراءة -->
    <div class="section">
        <h3>4️⃣ اختبار القراءة</h3>
        <button class="btn btn-success" onclick="testRead()">📋 عرض المنتجات</button>
        <div id="readStatus"></div>
    </div>

    <!-- 5. تنظيف -->
    <div class="section">
        <h3>5️⃣ تنظيف البيانات</h3>
        <button class="btn btn-outline" onclick="cleanTestData()">🧹 حذف المنتج التجريبي</button>
        <div id="cleanStatus"></div>
    </div>

    <div class="divider"></div>
    <div class="note">
        بعد نجاح الاختبارات، عد إلى التطبيق الرئيسي
    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- إعدادات Supabase الخاصة بك -->
<script>
    // ========== الإعدادات ==========
    const SUPABASE_URL = 'https://emvqitmpdkkuyjzegyxf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdnFpdG1wZGtrdXlqemVneXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTY2NjUsImV4cCI6MjA5MTc3MjY2NX0.gEeUDMmqNQj0Tb3b1WBlXxCsJaD_ZMxxmx_8mPYNVcU';
    
    // إنشاء العميل
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let testProductId = null;

    // التحقق من التهيئة
    function checkInit() {
        const el = document.getElementById('initStatus');
        if (typeof supabase !== 'undefined' && supabase) {
            el.className = 'status success';
            el.innerHTML = '✅ تم الاتصال بـ Supabase بنجاح!';
        } else {
            el.className = 'status error';
            el.innerHTML = '❌ فشل الاتصال. تأكد من المفاتيح.';
        }
    }

    // فحص الجداول
    async function checkTables() {
        const tables = ['products', 'parties', 'reps', 'invoices', 'purchases', 'transactions', 'settings', 'users'];
        const container = document.getElementById('tablesStatus');
        let html = '';
        for (let table of tables) {
            try {
                const { count, error } = await supabase.from(table).select('*', { count: 'exact', head: true });
                if (error) {
                    if (error.code === '42P01') {
                        html += `<div class="status error">❌ ${table}: غير موجودة</div>`;
                    } else if (error.message.includes('permission')) {
                        html += `<div class="status error">🔒 ${table}: خطأ صلاحيات (تأكد من تعطيل RLS)</div>`;
                    } else {
                        html += `<div class="status error">⚠️ ${table}: ${error.message}</div>`;
                    }
                } else {
                    html += `<div class="status success">✅ ${table}: موجودة (${count} سجلات)</div>`;
                }
            } catch (e) {
                html += `<div class="status error">🐞 ${table}: خطأ غير متوقع</div>`;
            }
        }
        container.innerHTML = html;
    }

    // اختبار الكتابة
    async function testWrite() {
        const el = document.getElementById('writeStatus');
        el.innerHTML = '<div class="status pending">⏳ جاري حفظ منتج تجريبي...</div>';
        const testProduct = {
            name: 'منتج تجريبي (للاختبار)',
            category: 'تجربة',
            description: 'تم إنشاؤه من اختبار الهاتف',
            units: [{ unit: 'قطعة', price: 10, min: 5, max: 15, barcode: 'TEST001', stock: 50 }]
        };
        try {
            const { data, error } = await supabase.from('products').insert(testProduct).select();
            if (error) {
                el.innerHTML = `<div class="status error">❌ فشل الحفظ: ${error.message}</div>`;
                if (error.code === '42501') el.innerHTML += '<br><small>⛔ تأكد من تعطيل RLS في Supabase</small>';
            } else {
                testProductId = data[0].id;
                el.innerHTML = `<div class="status success">✅ تم حفظ المنتج التجريبي!<br>ID: ${testProductId}</div>`;
            }
        } catch (e) {
            el.innerHTML = `<div class="status error">❌ خطأ: ${e.message}</div>`;
        }
    }

    // اختبار القراءة
    async function testRead() {
        const el = document.getElementById('readStatus');
        el.innerHTML = '<div class="status pending">⏳ جاري قراءة المنتجات...</div>';
        try {
            const { data, error } = await supabase.from('products').select('*').limit(10);
            if (error) {
                el.innerHTML = `<div class="status error">❌ فشل القراءة: ${error.message}</div>`;
            } else {
                let html = `<div class="status success">✅ تمت القراءة! (${data.length} منتج)</div>`;
                if (data.length) {
                    html += '<ul style="margin:10px 0 0; padding-right:20px;">';
                    data.forEach(p => { html += `<li>${p.name} - ${p.category}</li>`; });
                    html += '</ul>';
                }
                el.innerHTML = html;
            }
        } catch (e) {
            el.innerHTML = `<div class="status error">❌ خطأ: ${e.message}</div>`;
        }
    }

    // تنظيف
    async function cleanTestData() {
        const el = document.getElementById('cleanStatus');
        if (!testProductId) {
            el.innerHTML = '<div class="status pending">ℹ️ لا يوجد منتج تجريبي للحذف. جرب اختبار الكتابة أولاً.</div>';
            return;
        }
        el.innerHTML = '<div class="status pending">⏳ جاري الحذف...</div>';
        try {
            const { error } = await supabase.from('products').delete().eq('id', testProductId);
            if (error) {
                el.innerHTML = `<div class="status error">❌ فشل الحذف: ${error.message}</div>`;
            } else {
                el.innerHTML = '<div class="status success">✅ تم حذف المنتج التجريبي.</div>';
                testProductId = null;
            }
        } catch (e) {
            el.innerHTML = `<div class="status error">❌ خطأ: ${e.message}</div>`;
        }
    }

    // تشغيل الفحوصات تلقائياً عند التحميل
    window.onload = function() {
        checkInit();
        checkTables();
    };
</script>
</body>
</html>
